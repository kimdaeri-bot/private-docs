<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>레일클릭 인보이스 작성기 — DIPLAT KOREA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#0f1623;color:#e0e6f0;min-height:100vh}
header{background:linear-gradient(135deg,#0a2540,#1a1a2e);padding:28px 40px 22px;border-bottom:2px solid #2a2a4a;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
header h1{font-size:20px;font-weight:900;color:#fff}
header p{font-size:12px;color:rgba(255,255,255,.45);margin-top:4px}
.lock-badge{background:#1a3a6a;color:#4da6ff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:12px;letter-spacing:.5px}
.wrap{display:grid;grid-template-columns:420px 1fr;gap:0;min-height:calc(100vh - 82px)}
@media(max-width:1000px){.wrap{grid-template-columns:1fr}}

/* ── 좌측 폼 ── */
.form-panel{background:#131e2e;padding:28px 24px;overflow-y:auto;border-right:1px solid #1e2e40}
.form-panel h2{font-size:13px;font-weight:700;color:#6a8aaa;letter-spacing:1px;text-transform:uppercase;margin:0 0 14px;padding-bottom:8px;border-bottom:1px solid #1e2e40}
.form-section{margin-bottom:24px}
.form-row{margin-bottom:12px}
label{display:block;font-size:11.5px;color:#7a9ab8;margin-bottom:4px;font-weight:600}
input,select,textarea{width:100%;background:#0f1a28;border:1px solid #243040;border-radius:6px;color:#e0e6f0;font-size:13px;padding:8px 10px;outline:none;transition:border-color .2s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#4da6ff}
textarea{resize:vertical;min-height:64px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

/* 노선 아이템 */
.routes-list{display:flex;flex-direction:column;gap:10px}
.route-item{background:#0d1828;border:1px solid #1e2e40;border-radius:8px;padding:12px}
.route-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.route-item-header span{font-size:12px;font-weight:700;color:#4da6ff}
.remove-btn{background:#3a1020;color:#f87171;border:none;font-size:11px;padding:3px 8px;border-radius:4px;cursor:pointer}
.add-btn{background:#0d2347;color:#4da6ff;border:1px solid #1e3a6a;font-size:12px;font-weight:700;padding:8px 14px;border-radius:6px;cursor:pointer;width:100%;margin-top:6px;transition:background .2s}
.add-btn:hover{background:#1a3a6a}

.calc-box{background:#0d2347;border:1px solid #1e3a6a;border-radius:8px;padding:12px 14px;margin-top:6px}
.calc-row{display:flex;justify-content:space-between;font-size:12px;color:#7a9ab8;margin-bottom:4px}
.calc-row.total{color:#e0e6f0;font-weight:800;font-size:13px;border-top:1px solid #1e3a6a;padding-top:8px;margin-top:4px}
.calc-row.krw{color:#c084fc;font-size:12px}

.print-btn{width:100%;background:#7c5cbf;color:#fff;border:none;font-size:14px;font-weight:800;padding:13px;border-radius:8px;cursor:pointer;margin-top:8px;transition:background .2s}
.print-btn:hover{background:#6a4aad}
.reset-btn{width:100%;background:#1e2e40;color:#7a9ab8;border:none;font-size:12px;padding:8px;border-radius:6px;cursor:pointer;margin-top:6px}

/* ── 우측 프리뷰 ── */
.preview-panel{background:#f5f4f0;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:32px 20px}
.invoice-paper{background:#fff;width:210mm;min-height:297mm;padding:16mm 18mm;box-shadow:0 4px 32px rgba(0,0,0,.18);font-family:'Pretendard','Apple SD Gothic Neo','Arial',sans-serif;font-size:9pt;color:#1a1a1a;position:relative}
@media(max-width:1000px){.invoice-paper{width:100%;min-height:auto}}

.inv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;padding-bottom:12px;border-bottom:2px solid #1a3a6a}
.inv-logo{font-size:18pt;font-weight:900;color:#1a3a6a;letter-spacing:-.5px}
.inv-logo span{color:#4da6ff}
.inv-title{text-align:right}
.inv-title h1{font-size:22pt;font-weight:900;color:#1a3a6a;letter-spacing:2px;margin-bottom:4px}
.inv-title p{font-size:8pt;color:#666}

.inv-meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.meta-box{background:#f0f4fa;border-radius:6px;padding:10px 12px}
.meta-box h3{font-size:7.5pt;font-weight:800;color:#1a3a6a;letter-spacing:.8px;text-transform:uppercase;margin-bottom:6px}
.meta-box p{font-size:8.5pt;color:#333;line-height:1.7;margin:0}
.meta-box strong{color:#1a1a1a}

.inv-table{width:100%;border-collapse:collapse;margin-bottom:12px;font-size:8.5pt}
.inv-table thead tr{background:#1a3a6a;color:#fff}
.inv-table th{padding:7px 8px;text-align:left;font-weight:700;font-size:7.5pt;letter-spacing:.3px}
.inv-table td{padding:7px 8px;border-bottom:1px solid #e8ecf0;vertical-align:top}
.inv-table tr:last-child td{border-bottom:none}
.inv-table tr:nth-child(even){background:#f8f9fb}
.inv-table .num{text-align:right;font-feature-settings:'tnum'}

.policy-box{background:#fff8f0;border-left:3px solid #e67e22;border-radius:0 6px 6px 0;padding:10px 12px;margin-bottom:12px;font-size:7.5pt;color:#444;line-height:1.8}
.policy-box h3{font-size:8pt;font-weight:800;color:#e67e22;margin-bottom:6px}

.inv-total{display:flex;justify-content:flex-end;margin-bottom:12px}
.total-box{background:#1a3a6a;color:#fff;border-radius:8px;padding:12px 18px;min-width:200px}
.total-row{display:flex;justify-content:space-between;gap:20px;font-size:8.5pt;margin-bottom:4px}
.total-row:last-child{margin-bottom:0}
.total-row.big{font-size:11pt;font-weight:900;border-top:1px solid rgba(255,255,255,.3);padding-top:6px;margin-top:4px}
.total-row.sub{color:rgba(255,255,255,.7);font-size:7.5pt}
.total-row .amt{font-feature-settings:'tnum';text-align:right}

.inv-bank{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.bank-box{background:#f0f4fa;border-radius:6px;padding:10px 12px;border:1px solid #dce4ef}
.bank-box h3{font-size:7.5pt;font-weight:800;color:#1a3a6a;margin-bottom:6px;letter-spacing:.3px}
.bank-box p{font-size:8pt;color:#333;line-height:1.8;margin:0}

.inv-footer{border-top:1px solid #e0e4ea;padding-top:10px;display:flex;justify-content:space-between;align-items:flex-end;font-size:7.5pt;color:#666}
.company-info p{line-height:1.7}
.contact-info{text-align:right;color:#888}

/* 인쇄 */
@media print{
  body{background:#fff !important}
  .form-panel,.preview-panel > :not(.invoice-paper){display:none}
  .wrap{grid-template-columns:1fr}
  .preview-panel{padding:0;background:#fff}
  .invoice-paper{box-shadow:none;width:100%;margin:0;padding:12mm 15mm}
  header{display:none}
}
</style>
</head>
<body>
<header>
  <div>
    <span class="lock-badge">🔒 INTERNAL</span>
    <h1>🚂 레일클릭 인보이스 작성기</h1>
    <p>DIPLAT KOREA — 유럽철도 티켓 여행사용 인보이스</p>
  </div>
</header>

<div class="wrap">
<!-- ─── 좌측 폼 ─── -->
<div class="form-panel">

  <div class="form-section">
    <h2>📄 인보이스 기본 정보</h2>
    <div class="row2">
      <div class="form-row">
        <label>인보이스 번호</label>
        <input id="invNo" value="" placeholder="자동 생성">
      </div>
      <div class="form-row">
        <label>발행일</label>
        <input type="date" id="invDate">
      </div>
    </div>
  </div>

  <div class="form-section">
    <h2>🏢 클라이언트 정보</h2>
    <div class="form-row">
      <label>여행사명</label>
      <input id="clientCompany" placeholder="예: VIP 여행사">
    </div>
    <div class="row2">
      <div class="form-row">
        <label>담당자명</label>
        <input id="clientName" placeholder="예: 엄민지 팀장님">
      </div>
      <div class="form-row">
        <label>연락처</label>
        <input id="clientPhone" placeholder="010-0000-0000">
      </div>
    </div>
    <div class="form-row">
      <label>이메일</label>
      <input id="clientEmail" type="email" placeholder="example@travel.com">
    </div>
  </div>

  <div class="form-section">
    <h2>🚂 노선 / 서비스 내역</h2>
    <div id="routesList" class="routes-list"></div>
    <button class="add-btn" onclick="addRoute()">+ 노선 추가</button>
  </div>

  <div class="form-section">
    <h2>💱 환율</h2>
    <div class="row2">
      <div class="form-row">
        <label>통화</label>
        <select id="currency" onchange="render()">
          <option value="EUR">EUR (유로)</option>
          <option value="USD">USD (달러)</option>
          <option value="GBP">GBP (파운드)</option>
          <option value="CHF">CHF (스위스 프랑)</option>
        </select>
      </div>
      <div class="form-row">
        <label>1 <span id="currLabel">EUR</span> = KRW</label>
        <input type="number" id="exchangeRate" value="1746.86" step="0.01" oninput="render()">
      </div>
    </div>
    <div class="calc-box" id="calcBox"></div>
  </div>

  <div class="form-section">
    <h2>📋 환불·변경 규정</h2>
    <div class="form-row">
      <label><input type="checkbox" id="inclPolicy" checked onchange="render()"> 환불/변경 규정 포함</label>
    </div>
    <div class="form-row">
      <label>규정 텍스트 (수정 가능)</label>
      <textarea id="policyText" oninput="render()" rows="7">[ 환불 규정 ]
• 탑승일 기준 31일전까지 환불 시 80% 환불 가능
• 탑승일 기준 30일 ~ 9일전까지 환불 시 50% 환불 가능
• 탑승일 기준 8일전부터 환불 불가

[ 변경 규정 ]
• 탑승일 기준 31일전까지 변경 가능
  (단, 시간/날짜 변경 시 티켓 차액 발생될 수 있으며,
   기존 티켓가보다 낮은 요금으로 변경된 경우 차액 환불 불가)</textarea>
    </div>
  </div>

  <div class="form-section">
    <h2>✉️ 메모 (선택)</h2>
    <textarea id="memo" placeholder="추가 안내사항..." rows="3" oninput="render()"></textarea>
  </div>

  <button class="print-btn" onclick="window.print()">🖨️ PDF 저장 / 인쇄</button>
  <button class="reset-btn" onclick="resetForm()">↺ 초기화</button>
</div>

<!-- ─── 우측 프리뷰 ─── -->
<div class="preview-panel">
  <div class="invoice-paper" id="invoicePaper">
    <!-- JS로 렌더링 -->
  </div>
</div>
</div>

<script>
// ─── 상수 ───────────────────────────────────────
const COMPANY = {
  name: 'DIPLAT KOREA',
  nameKo: '디플랫코리아',
  regNo: '604-49-00650',
  address: '5F, 152, Magokseo-ro, Gangseo-gu, Seoul, Republic of Korea',
  repName: '정경준',
};
const BANK = {
  eur: { bank:'국민은행', no:'214968-11-011656', holder:'디플랫코리아(정경준)' },
  krw: { bank:'국민은행', no:'214901-04-350408', holder:'디플랫코리아(정경준)' },
};
const RAILCLICK = {
  name: '레일클릭',
  phone: '02-3788-9175',
  email1: 'yoonsim@apg-ga.co.kr',
  email2: 'june.jeong@apg-ga.co.kr',
};

// ─── 초기화 ──────────────────────────────────────
let routes = [];
let routeId = 0;

function init() {
  // 오늘 날짜
  const now = new Date();
  const ymd = now.toISOString().slice(0,10);
  document.getElementById('invDate').value = ymd;
  // 인보이스 번호 자동 생성
  const seq = String(Math.floor(Math.random()*90)+10);
  document.getElementById('invNo').value = `DPL-RAIL-${ymd.replace(/-/g,'')}-${seq}`;
  // 기본 노선 1개
  addRoute();
  // 입력 이벤트 전체
  document.querySelectorAll('input,select,textarea').forEach(el=>{
    el.addEventListener('input', render);
    el.addEventListener('change', render);
  });
  render();
}

// ─── 노선 추가/삭제 ──────────────────────────────
function addRoute() {
  const id = routeId++;
  routes.push(id);
  const div = document.createElement('div');
  div.className = 'route-item';
  div.id = `route-${id}`;
  div.innerHTML = `
    <div class="route-item-header">
      <span>노선 #${routes.indexOf(id)+1}</span>
      <button class="remove-btn" onclick="removeRoute(${id})">✕ 삭제</button>
    </div>
    <div class="form-row"><label>노선명 / 서비스명</label>
      <input id="r${id}_name" placeholder="예: Eurostar Standard, ICE Frankfurt→Paris" oninput="render()"></div>
    <div class="row3">
      <div class="form-row"><label>인원(pax)</label>
        <input type="number" id="r${id}_pax" value="1" min="1" oninput="render()"></div>
      <div class="form-row"><label>단가</label>
        <input type="number" id="r${id}_price" value="5" step="0.01" oninput="render()"></div>
      <div class="form-row"><label>소계</label>
        <input id="r${id}_sub" readonly style="color:#4da6ff;font-weight:700;cursor:default"></div>
    </div>
    <div class="form-row"><label>비고 (선택)</label>
      <input id="r${id}_note" placeholder="예: 발권 수수료" oninput="render()"></div>
  `;
  document.getElementById('routesList').appendChild(div);
  render();
}

function removeRoute(id) {
  routes = routes.filter(r=>r!==id);
  document.getElementById(`route-${id}`).remove();
  render();
}

// ─── 숫자 포맷 ───────────────────────────────────
function fmt(n, dec=2) {
  return Number(n).toLocaleString('en-US', {minimumFractionDigits:dec, maximumFractionDigits:dec});
}
function fmtKrw(n) {
  return Math.round(n).toLocaleString('ko-KR');
}

// ─── 렌더링 ──────────────────────────────────────
function render() {
  const cur = document.getElementById('currency').value;
  document.getElementById('currLabel').textContent = cur;

  const rate = parseFloat(document.getElementById('exchangeRate').value)||0;
  const invNo = document.getElementById('invNo').value;
  const invDate = document.getElementById('invDate').value;
  const clientCo = document.getElementById('clientCompany').value || '—';
  const clientName = document.getElementById('clientName').value || '—';
  const clientPhone = document.getElementById('clientPhone').value || '—';
  const clientEmail = document.getElementById('clientEmail').value || '—';
  const inclPolicy = document.getElementById('inclPolicy').checked;
  const policyText = document.getElementById('policyText').value;
  const memo = document.getElementById('memo').value;

  // 노선별 계산
  let totalFX = 0;
  const routeData = routes.map(id => {
    const name = (document.getElementById(`r${id}_name`)?.value)||'';
    const pax = parseInt(document.getElementById(`r${id}_pax`)?.value)||0;
    const price = parseFloat(document.getElementById(`r${id}_price`)?.value)||0;
    const note = (document.getElementById(`r${id}_note`)?.value)||'';
    const sub = pax * price;
    if(document.getElementById(`r${id}_sub`)) document.getElementById(`r${id}_sub`).value = fmt(sub);
    totalFX += sub;
    return {name, pax, price, note, sub};
  });

  const totalKrw = totalFX * rate;

  // 계산 박스
  document.getElementById('calcBox').innerHTML = `
    <div class="calc-row"><span>합계 (${cur})</span><span><b>${fmt(totalFX)} ${cur}</b></span></div>
    <div class="calc-row krw"><span>환산 (KRW, 1${cur}=${fmtKrw(rate)})</span><span>₩${fmtKrw(totalKrw)}</span></div>
  `;

  // 날짜 포맷
  let dateStr = invDate;
  if(invDate) {
    const d = new Date(invDate);
    const mo = ['January','February','March','April','May','June','July','August','September','October','November','December'][d.getMonth()];
    dateStr = `${mo} ${d.getDate()}, ${d.getFullYear()}`;
  }

  // 노선 테이블 rows
  const tableRows = routeData.map(r=>`
    <tr>
      <td>${r.name||'—'}</td>
      <td>${r.note||'—'}</td>
      <td class="num">${r.pax}</td>
      <td class="num">${cur} ${fmt(r.price)}</td>
      <td class="num"><b>${cur} ${fmt(r.sub)}</b></td>
    </tr>
  `).join('');

  // 정책 섹션
  const policyHtml = inclPolicy ? `
    <div class="policy-box">
      <h3>📋 환불 · 변경 규정</h3>
      ${policyText.split('\n').map(l=>l.trim()?`<p>${l}</p>`:'').join('')}
    </div>` : '';

  // 메모
  const memoHtml = memo ? `<div class="policy-box" style="border-color:#2980b9;background:#f0f8ff;margin-bottom:12px">
    <h3 style="color:#2980b9">📝 메모</h3>
    ${memo.split('\n').map(l=>`<p>${l}</p>`).join('')}
  </div>` : '';

  // EUR/USD 계좌 분기
  const fxBankLabel = cur === 'GBP' ? 'GBP' : cur === 'USD' ? 'USD' : cur === 'CHF' ? 'CHF' : 'EUR';

  // 인보이스 HTML
  document.getElementById('invoicePaper').innerHTML = `
    <div class="inv-header">
      <div>
        <div class="inv-logo">DIPLAT <span>KOREA</span></div>
        <div style="font-size:7pt;color:#666;margin-top:4px">${COMPANY.address}</div>
        <div style="font-size:7pt;color:#666">사업자등록번호: ${COMPANY.regNo} | 대표: ${COMPANY.repName}</div>
      </div>
      <div class="inv-title">
        <h1>INVOICE</h1>
        <p>Invoice #: <b>${invNo||'DPL-RAIL-XXXXXXXX-XX'}</b></p>
        <p>Date: <b>${dateStr||'—'}</b></p>
      </div>
    </div>

    <div class="inv-meta">
      <div class="meta-box">
        <h3>CLIENT</h3>
        <p><strong>${clientCo}</strong></p>
        <p>Name: ${clientName}</p>
        <p>Contact: ${clientPhone}</p>
        <p>E-mail: ${clientEmail}</p>
      </div>
      <div class="meta-box">
        <h3>ISSUED BY</h3>
        <p><strong>${COMPANY.name}</strong> (${COMPANY.nameKo})</p>
        <p>대표: ${COMPANY.repName}</p>
        <p>사업자등록번호: ${COMPANY.regNo}</p>
        <p style="font-size:7pt;color:#888;margin-top:4px">Contact: ${RAILCLICK.name} | ${RAILCLICK.phone}</p>
        <p style="font-size:7pt;color:#888">${RAILCLICK.email1} / ${RAILCLICK.email2}</p>
      </div>
    </div>

    <table class="inv-table">
      <thead>
        <tr>
          <th>노선 / 서비스</th>
          <th>내용</th>
          <th class="num">인원</th>
          <th class="num">단가</th>
          <th class="num">소계</th>
        </tr>
      </thead>
      <tbody>
        ${tableRows||'<tr><td colspan="5" style="text-align:center;color:#aaa;padding:16px">노선을 추가하세요</td></tr>'}
      </tbody>
    </table>

    ${policyHtml}
    ${memoHtml}

    <div class="inv-total">
      <div class="total-box">
        <div class="total-row sub"><span>환율</span><span class="amt">1 ${cur} = ₩${fmtKrw(rate)}</span></div>
        <div class="total-row big"><span>${cur} TOTAL</span><span class="amt">${cur} ${fmt(totalFX)}</span></div>
        <div class="total-row"><span>KRW 환산</span><span class="amt">₩${fmtKrw(totalKrw)}</span></div>
      </div>
    </div>

    <div class="inv-bank">
      <div class="bank-box">
        <h3>🏦 ${fxBankLabel} 송금 계좌</h3>
        <p>은행: <b>${BANK.eur.bank}</b></p>
        <p>계좌번호: <b>${BANK.eur.no}</b></p>
        <p>예금주: ${BANK.eur.holder}</p>
      </div>
      <div class="bank-box">
        <h3>🏦 원화(KRW) 송금 계좌</h3>
        <p>은행: <b>${BANK.krw.bank}</b></p>
        <p>계좌번호: <b>${BANK.krw.no}</b></p>
        <p>예금주: ${BANK.krw.holder}</p>
      </div>
    </div>

    <div class="inv-footer">
      <div class="company-info">
        <p><b>${COMPANY.name}</b> | 사업자등록번호: ${COMPANY.regNo}</p>
        <p>${COMPANY.address}</p>
      </div>
      <div class="contact-info">
        <p>레일클릭 | ${RAILCLICK.phone}</p>
        <p>${RAILCLICK.email1}</p>
        <p>${RAILCLICK.email2}</p>
      </div>
    </div>
  `;
}

function resetForm() {
  if(!confirm('초기화하시겠습니까?')) return;
  routes = [];
  routeId = 0;
  document.getElementById('routesList').innerHTML = '';
  document.getElementById('clientCompany').value='';
  document.getElementById('clientName').value='';
  document.getElementById('clientPhone').value='';
  document.getElementById('clientEmail').value='';
  document.getElementById('memo').value='';
  init();
}

init();
</script>
