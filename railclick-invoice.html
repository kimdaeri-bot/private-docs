<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet">
<meta name="bingbot" content="noindex, nofollow">
<title>레일클릭 인보이스 작성기 — DIPLAT KOREA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#0f1623;color:#e0e6f0;min-height:100vh}
header{background:linear-gradient(135deg,#0a2540,#1a1a2e);padding:24px 36px 18px;border-bottom:2px solid #2a2a4a;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
header h1{font-size:19px;font-weight:900;color:#fff}
header p{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px}
.lock-badge{background:#1a3a6a;color:#4da6ff;font-size:11px;font-weight:800;padding:3px 10px;border-radius:12px;letter-spacing:.5px;white-space:nowrap}
.wrap{display:grid;grid-template-columns:440px 1fr;gap:0;min-height:calc(100vh - 74px)}
@media(max-width:1000px){.wrap{grid-template-columns:1fr}}
.form-panel{background:#131e2e;padding:24px 20px;overflow-y:auto;border-right:1px solid #1e2e40}
.form-panel h2{font-size:12px;font-weight:700;color:#6a8aaa;letter-spacing:1px;text-transform:uppercase;margin:0 0 12px;padding-bottom:7px;border-bottom:1px solid #1e2e40}
.form-section{margin-bottom:22px}
.form-row{margin-bottom:10px}
label{display:block;font-size:11px;color:#7a9ab8;margin-bottom:3px;font-weight:600}
input,select,textarea{width:100%;background:#0f1a28;border:1px solid #243040;border-radius:6px;color:#e0e6f0;font-size:12.5px;padding:7px 9px;outline:none;transition:border-color .2s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:#4da6ff}
input[readonly]{color:#4da6ff;cursor:default;background:#0a1520}
textarea{resize:vertical;min-height:60px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.row4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}

/* 이미지 드롭존 */
.img-dropzone{border:2px dashed #2a4a6a;border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;background:#0d1828;position:relative;min-height:90px;display:flex;align-items:center;justify-content:center}
.img-dropzone:hover,.img-dropzone.drag-over{border-color:#4da6ff;background:#0d2040}
.img-dropzone p{font-size:11.5px;color:#5a80a0;line-height:1.8;pointer-events:none}
.img-dropzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.img-thumb{margin-top:10px;position:relative;display:inline-block;width:100%}
.img-thumb img{max-width:100%;border-radius:6px;border:1px solid #243040;max-height:110px;object-fit:contain;width:100%}
.img-clear{position:absolute;top:4px;right:4px;background:#cc3300;color:#fff;border:none;border-radius:4px;font-size:11px;padding:3px 7px;cursor:pointer;font-weight:700}
.parse-btn{width:100%;margin-top:8px;background:#0d3a2a;color:#4ade80;border:1px solid #1a5a3a;font-size:12px;font-weight:700;padding:9px;border-radius:6px;cursor:pointer;transition:background .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.parse-btn:hover{background:#1a4a3a}
.parse-btn:disabled{opacity:.5;cursor:not-allowed}
.parse-status{margin-top:8px;font-size:11.5px;text-align:center;min-height:16px}
.parse-status.loading{color:#f59e0b}
.parse-status.success{color:#4ade80}
.parse-status.error{color:#f87171}

/* 노선 아이템 */
.routes-list{display:flex;flex-direction:column;gap:10px}
.route-item{background:#0d1828;border:1px solid #1e2e40;border-radius:8px;padding:12px}
.route-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.route-item-header span{font-size:12px;font-weight:700;color:#4da6ff}
.remove-btn{background:#3a1020;color:#f87171;border:none;font-size:11px;padding:3px 8px;border-radius:4px;cursor:pointer}
.add-btn{background:#0d2347;color:#4da6ff;border:1px solid #1e3a6a;font-size:12px;font-weight:700;padding:8px 14px;border-radius:6px;cursor:pointer;width:100%;margin-top:6px;transition:background .2s}
.add-btn:hover{background:#1a3a6a}
.route-divider{height:1px;background:#1e2e40;margin:8px 0}

.calc-box{background:#0d2347;border:1px solid #1e3a6a;border-radius:8px;padding:10px 12px;margin-top:6px}
.calc-row{display:flex;justify-content:space-between;font-size:11.5px;color:#7a9ab8;margin-bottom:3px}
.calc-row.total{color:#e0e6f0;font-weight:800;font-size:13px;border-top:1px solid #1e3a6a;padding-top:7px;margin-top:4px}
.calc-row.krw{color:#c084fc;font-size:11.5px}

.print-btn{width:100%;background:#7c5cbf;color:#fff;border:none;font-size:14px;font-weight:800;padding:12px;border-radius:8px;cursor:pointer;margin-top:6px;transition:background .2s}
.print-btn:hover{background:#6a4aad}
.reset-btn{width:100%;background:#1e2e40;color:#7a9ab8;border:none;font-size:12px;padding:7px;border-radius:6px;cursor:pointer;margin-top:6px}

/* ── 인보이스 프리뷰 ── */
.preview-panel{background:#f0ede8;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:28px 16px}
.invoice-paper{background:#fff;width:210mm;min-height:297mm;padding:14mm 16mm;box-shadow:0 4px 32px rgba(0,0,0,.18);font-family:'Pretendard','Apple SD Gothic Neo','Arial',sans-serif;font-size:8.5pt;color:#1a1a1a;position:relative}
@media(max-width:1000px){.invoice-paper{width:100%;min-height:auto}}
.inv-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;padding-bottom:10px;border-bottom:2.5px solid #1a3a6a}
.inv-logo{font-size:17pt;font-weight:900;color:#1a3a6a;letter-spacing:-.5px;line-height:1}
.inv-logo span{color:#4da6ff}
.inv-logo small{display:block;font-size:7pt;font-weight:400;color:#888;margin-top:3px}
.inv-title h1{font-size:21pt;font-weight:900;color:#1a3a6a;letter-spacing:2px;margin-bottom:3px;text-align:right}
.inv-title p{font-size:8pt;color:#555;text-align:right;line-height:1.6}
.inv-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.meta-box{background:#f0f4fa;border-radius:6px;padding:9px 11px}
.meta-box h3{font-size:7pt;font-weight:800;color:#1a3a6a;letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid #d8e0ec}
.meta-box p{font-size:8pt;color:#333;line-height:1.75;margin:0}
.meta-box strong{color:#111}
.inv-schedule-img{margin-bottom:10px;text-align:left;border:1px solid #e8ecf0;border-radius:4px;overflow:hidden}
.inv-schedule-img img{max-width:80%;max-height:160px;object-fit:contain;display:block;margin:0}
.inv-table{width:100%;border-collapse:collapse;margin-bottom:10px;font-size:8pt}
.inv-table thead tr{background:#1a3a6a;color:#fff}
.inv-table th{padding:6px 7px;text-align:left;font-weight:700;font-size:7pt;letter-spacing:.2px}
.inv-table td{padding:6px 7px;border-bottom:1px solid #e8ecf0;vertical-align:middle}
.inv-table tr:last-child td{border-bottom:none}
.inv-table tr:nth-child(even){background:#f8f9fb}
.inv-table .num{text-align:right;font-feature-settings:'tnum';white-space:nowrap}
.inv-table .mono{font-size:7.5pt;color:#666}
.train-num{display:inline-block;background:#1a3a6a;color:#fff;font-size:7pt;font-weight:800;padding:1px 5px;border-radius:3px;margin-right:4px;letter-spacing:.3px}
.station-arrow{color:#1a3a6a;font-weight:900;margin:0 3px}
.policy-box{background:#fff8f0;border-left:3px solid #e67e22;border-radius:0 6px 6px 0;padding:9px 11px;margin-bottom:10px;font-size:7.5pt;color:#444;line-height:1.85}
.policy-box h3{font-size:8pt;font-weight:800;color:#e67e22;margin-bottom:5px}
.inv-total{display:flex;justify-content:flex-end;margin-bottom:10px}
.total-box{background:#1a3a6a;color:#fff;border-radius:8px;padding:11px 16px;min-width:190px}
.total-row{display:flex;justify-content:space-between;gap:18px;font-size:8pt;margin-bottom:3px}
.total-row:last-child{margin-bottom:0}
.total-row.big{font-size:11pt;font-weight:900;border-top:1px solid rgba(255,255,255,.3);padding-top:5px;margin-top:4px}
.total-row.sub{color:rgba(255,255,255,.65);font-size:7.5pt}
.total-row .amt{font-feature-settings:'tnum';text-align:right}
.inv-bank{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.bank-box{background:#f0f4fa;border-radius:6px;padding:9px 11px;border:1px solid #dce4ef}
.bank-box h3{font-size:7pt;font-weight:800;color:#1a3a6a;margin-bottom:5px;letter-spacing:.3px}
.bank-box p{font-size:8pt;color:#333;line-height:1.8;margin:0}
.inv-footer{border-top:1px solid #e0e4ea;padding-top:8px;display:flex;justify-content:space-between;align-items:flex-end;font-size:7.5pt;color:#777}
.company-info p{line-height:1.7}
.contact-info{text-align:right;color:#999}
.memo-box{background:#f0f8ff;border-left:3px solid #2980b9;border-radius:0 6px 6px 0;padding:9px 11px;margin-bottom:10px;font-size:7.5pt;color:#444;line-height:1.8}
.memo-box h3{font-size:8pt;font-weight:800;color:#2980b9;margin-bottom:4px}
/* 여행사 저장 */
/* 수수료 */
.fee-item{background:#0d1828;border:1px solid #1e2e40;border-radius:8px;padding:10px 12px}
.fee-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.fee-item-header span{font-size:12px;font-weight:700;color:#f59e0b}
.inv-fee-row{background:#fefdf8;border-bottom:1px solid #e8ecf0}
.inv-fee-row td{color:#666;font-style:italic}
.agency-select-row{display:flex;gap:6px;margin-bottom:10px}
.agency-select-row select{flex:1;background:#0f1a28;border:1px solid #243040;border-radius:6px;color:#e0e6f0;font-size:12.5px;padding:7px 9px;outline:none}
.agency-select-row select:focus{border-color:#4da6ff}
.agency-del-btn{background:#3a1020;color:#f87171;border:none;font-size:12px;padding:0 10px;border-radius:6px;cursor:pointer;white-space:nowrap}
.agency-save-btn{width:100%;background:#0d3a1a;color:#4ade80;border:1px solid #1a5a2a;font-size:12px;font-weight:700;padding:8px;border-radius:6px;cursor:pointer;margin-top:4px;transition:background .2s}
.agency-save-btn:hover{background:#1a4a2a}
@media print{
  body{background:#fff!important}.form-panel,.preview-panel>:not(.invoice-paper){display:none}
  .wrap{grid-template-columns:1fr}.preview-panel{padding:0;background:#fff}
  .invoice-paper{box-shadow:none;width:100%;margin:0;padding:10mm 13mm}
  header{display:none}
}
</style>
</head>
<body>
<header>
  <span class="lock-badge">🔒 INTERNAL</span>
  <div>
    <h1>🚂 레일클릭 인보이스 작성기</h1>
    <p>DIPLAT KOREA — 유럽철도 티켓 여행사용 인보이스</p>
  </div>
</header>

<div class="wrap">
<!-- ─── 좌측 폼 ─── -->
<div class="form-panel">

  <!-- 1. 스케줄 이미지 (최상단) -->
  <div class="form-section">
    <h2>🖼️ 스케줄 / 일정 이미지</h2>
    <div class="img-dropzone" id="dropzone">
      <input type="file" id="imgFile" accept="image/*" onchange="handleImgFile(this)">
      <p>📋 <b>Ctrl+V</b> 붙여넣기<br>또는 클릭해서 파일 선택 / 드래그 앤 드롭</p>
    </div>
    <div id="imgThumb" style="display:none" class="img-thumb">
      <img id="imgPreviewSmall" src="" alt="스케줄 이미지">
      <button class="img-clear" onclick="clearImg()">✕</button>
    </div>
    <button class="parse-btn" id="parseBtn" onclick="parseImage()" disabled>
      ✨ AI 자동 파싱 — 노선 정보 자동 입력
    </button>
    <div class="parse-status" id="parseStatus"></div>
  </div>

  <!-- 2. 인보이스 기본 정보 -->
  <div class="form-section">
    <h2>📄 인보이스 기본 정보</h2>
    <div class="row2">
      <div class="form-row">
        <label>인보이스 번호</label>
        <input id="invNo" placeholder="자동 생성">
      </div>
      <div class="form-row">
        <label>발행일</label>
        <input type="date" id="invDate">
      </div>
    </div>
  </div>

  <!-- 3. 클라이언트 -->
  <div class="form-section">
    <h2>🏢 클라이언트 정보</h2>
    <!-- 저장된 여행사 불러오기 -->
    <div class="agency-select-row">
      <select id="agencySelect" onchange="loadAgency()">
        <option value="">── 저장된 여행사 선택 ──</option>
      </select>
      <button class="agency-del-btn" onclick="deleteAgency()" title="선택한 여행사 삭제">🗑</button>
    </div>
    <div class="form-row">
      <label>여행사명</label>
      <input id="clientCompany" placeholder="예: VIP 여행사">
    </div>
    <div class="row2">
      <div class="form-row">
        <label>담당자명</label>
        <input id="clientName" placeholder="예: 엄민지 팀장님">
      </div>
      <div class="form-row">
        <label>연락처</label>
        <input id="clientPhone" placeholder="010-0000-0000">
      </div>
    </div>
    <div class="form-row">
      <label>이메일</label>
      <input id="clientEmail" type="email" placeholder="example@travel.com">
    </div>
    <button class="agency-save-btn" onclick="saveAgency()">💾 현재 여행사 정보 저장</button>
  </div>

  <!-- 4. 노선 / 서비스 내역 -->
  <div class="form-section">
    <h2>🚂 노선 / 서비스 내역</h2>
    <div id="routesList" class="routes-list"></div>
    <button class="add-btn" onclick="addRoute()">+ 노선 추가</button>
  </div>

  <!-- 4-2. 수수료 -->
  <div class="form-section">
    <h2>💳 수수료 (선택)</h2>
    <div id="feeList" class="routes-list"></div>
    <button class="add-btn" onclick="addFee()">+ 수수료 항목 추가</button>
  </div>

  <!-- 5. 환율 -->
  <div class="form-section">
    <h2>💱 환율</h2>
    <div class="row2">
      <div class="form-row">
        <label>통화</label>
        <select id="currency" onchange="render()">
          <option value="EUR">EUR (유로)</option>
          <option value="USD">USD (달러)</option>
          <option value="GBP">GBP (파운드)</option>
          <option value="CHF">CHF (스위스 프랑)</option>
        </select>
      </div>
      <div class="form-row">
        <label>1 <span id="currLabel">EUR</span> = KRW</label>
        <input type="number" id="exchangeRate" value="1746.86" step="0.01" oninput="render()">
      </div>
    </div>
    <div class="calc-box" id="calcBox"></div>
  </div>

  <!-- 6. 환불 규정 -->
  <div class="form-section">
    <h2>📋 환불·변경 규정</h2>
    <div class="form-row">
      <label><input type="checkbox" id="inclPolicy" checked onchange="render()"> 인보이스에 포함</label>
    </div>
    <textarea id="policyText" oninput="render()" rows="7">[ 환불 규정 ]
• 탑승일 기준 31일전까지 환불 시 80% 환불 가능
• 탑승일 기준 30일 ~ 9일전까지 환불 시 50% 환불 가능
• 탑승일 기준 8일전부터 환불 불가

[ 변경 규정 ]
• 탑승일 기준 31일전까지 변경 가능
  (단, 시간/날짜 변경 시 티켓 차액 발생될 수 있으며,
   기존 티켓가보다 낮은 요금으로 변경된 경우 차액 환불 불가)</textarea>
  </div>

  <!-- 7. 메모 -->
  <div class="form-section">
    <h2>✉️ 메모 (선택)</h2>
    <textarea id="memo" placeholder="추가 안내사항..." rows="3" oninput="render()"></textarea>
  </div>

  <button class="print-btn" onclick="window.print()">🖨️ PDF 저장 / 인쇄</button>
  <button class="reset-btn" onclick="resetForm()">↺ 초기화</button>
</div>

<!-- ─── 우측 프리뷰 ─── -->
<div class="preview-panel">
  <div class="invoice-paper" id="invoicePaper"></div>
</div>
</div>

<script>
// ─── 수수료 ──────────────────────────────────────
let fees = [], feeId = 0;

function addFee() {
  const id = feeId++;
  fees.push(id);
  const div = document.createElement('div');
  div.className = 'fee-item'; div.id = `fee-${id}`;
  div.innerHTML = `
    <div class="fee-item-header">
      <span>💳 수수료 #${fees.indexOf(id)+1}</span>
      <button class="remove-btn" onclick="removeFee(${id})">✕ 삭제</button>
    </div>
    <div class="row2">
      <div class="form-row"><label>수수료 명칭</label>
        <input id="f${id}_name" placeholder="예: 발권 수수료" value="발권 수수료" oninput="render()"></div>
      <div class="form-row"><label>단가</label>
        <input type="number" id="f${id}_price" value="5" step="0.01" oninput="render()"></div>
    </div>
    <div class="row3">
      <div class="form-row"><label>수량</label>
        <input type="number" id="f${id}_qty" value="1" min="1" oninput="render()"></div>
      <div class="form-row"><label>자동(전체 인원)</label>
        <label style="display:flex;align-items:center;gap:6px;margin-top:4px">
          <input type="checkbox" id="f${id}_auto" onchange="render()"> 전체 pax 연동
        </label></div>
      <div class="form-row"><label>소계</label>
        <input id="f${id}_sub" readonly></div>
    </div>
  `;
  document.getElementById('feeList').appendChild(div);
  render();
}
function removeFee(id) {
  fees = fees.filter(f=>f!==id);
  document.getElementById(`fee-${id}`).remove();
  render();
}

// ─── 여행사 저장/불러오기 ─────────────────────────
const AGENCY_KEY = 'railclick_agencies';

function getAgencies() {
  try { return JSON.parse(localStorage.getItem(AGENCY_KEY)||'[]'); } catch{ return []; }
}
function saveAgencies(list) {
  localStorage.setItem(AGENCY_KEY, JSON.stringify(list));
}
function refreshAgencySelect() {
  const sel = document.getElementById('agencySelect');
  const list = getAgencies();
  sel.innerHTML = '<option value="">── 저장된 여행사 선택 ──</option>' +
    list.map((a,i)=>`<option value="${i}">${a.company}${a.name?' / '+a.name:''}</option>`).join('');
}
function saveAgency() {
  const company = document.getElementById('clientCompany').value.trim();
  if(!company) { alert('여행사명을 먼저 입력하세요.'); return; }
  const list = getAgencies();
  const entry = {
    company,
    name: document.getElementById('clientName').value.trim(),
    phone: document.getElementById('clientPhone').value.trim(),
    email: document.getElementById('clientEmail').value.trim(),
  };
  // 같은 여행사명 있으면 업데이트, 없으면 추가
  const idx = list.findIndex(a=>a.company===company);
  if(idx>=0) { list[idx]=entry; } else { list.push(entry); }
  saveAgencies(list);
  refreshAgencySelect();
  // 방금 저장한 항목 선택 상태로
  const newIdx = getAgencies().findIndex(a=>a.company===company);
  document.getElementById('agencySelect').value = newIdx;
  alert(`✅ "${company}" 저장 완료!`);
}
function loadAgency() {
  const sel = document.getElementById('agencySelect');
  if(!sel.value && sel.value!=='0') return;
  const list = getAgencies();
  const a = list[parseInt(sel.value)];
  if(!a) return;
  document.getElementById('clientCompany').value = a.company||'';
  document.getElementById('clientName').value = a.name||'';
  document.getElementById('clientPhone').value = a.phone||'';
  document.getElementById('clientEmail').value = a.email||'';
  render();
}
function deleteAgency() {
  const sel = document.getElementById('agencySelect');
  if(!sel.value && sel.value!=='0') { alert('삭제할 여행사를 선택하세요.'); return; }
  const list = getAgencies();
  const a = list[parseInt(sel.value)];
  if(!a) return;
  if(!confirm(`"${a.company}" 삭제하시겠습니까?`)) return;
  list.splice(parseInt(sel.value),1);
  saveAgencies(list);
  refreshAgencySelect();
}

const COMPANY = {
  name:'DIPLAT KOREA', nameKo:'디플랫코리아',
  regNo:'604-49-00650', repName:'정경준',
  address:'5F, 152, Magokseo-ro, Gangseo-gu, Seoul, Republic of Korea',
};
const BANK = {
  fx:  { bank:'국민은행', no:'214968-11-011656', holder:'디플랫코리아(정경준)' },
  krw: { bank:'국민은행', no:'214901-04-350408', holder:'디플랫코리아(정경준)' },
};
const RAILCLICK = { name:'레일클릭', phone:'02-3788-9175', email1:'yoonsim.choi@apg-ga.co.kr', email2:'june.jeong@apg-ga.co.kr' };
const PARSE_API = 'https://enttix-omega.vercel.app/api/parse-schedule';

let routes = [], routeId = 0, scheduleImgDataUrl = null, scheduleImgMime = 'image/png';

// ─── 이미지 처리 ──────────────────────────────
function handleImgFile(input) { if(input.files[0]) readImgFile(input.files[0]); }
function readImgFile(file) {
  if(!file.type.startsWith('image/')) return;
  scheduleImgMime = file.type;
  const reader = new FileReader();
  reader.onload = e => setImg(e.target.result);
  reader.readAsDataURL(file);
}
function setImg(dataUrl) {
  scheduleImgDataUrl = dataUrl;
  document.getElementById('imgPreviewSmall').src = dataUrl;
  document.getElementById('imgThumb').style.display = 'block';
  document.getElementById('parseBtn').disabled = false;
  setParseStatus('');
  render();
}
function clearImg() {
  scheduleImgDataUrl = null;
  document.getElementById('imgThumb').style.display = 'none';
  document.getElementById('imgFile').value = '';
  document.getElementById('parseBtn').disabled = true;
  setParseStatus('');
  render();
}
function setParseStatus(msg, cls='') {
  const el = document.getElementById('parseStatus');
  el.textContent = msg; el.className = 'parse-status ' + cls;
}

// ─── AI 파싱 ──────────────────────────────────
async function parseImage() {
  if(!scheduleImgDataUrl) return;
  const btn = document.getElementById('parseBtn');
  btn.disabled = true;
  setParseStatus('✨ AI 분석 중...', 'loading');
  try {
    const base64 = scheduleImgDataUrl.split(',')[1];
    const res = await fetch(PARSE_API, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ imageBase64: base64, mediaType: scheduleImgMime }),
    });
    const data = await res.json();
    if(!res.ok || data.error) throw new Error(data.error||'파싱 실패');
    applyParsed(data);
    setParseStatus(`✅ ${(data.routes||[]).length}개 노선 자동 입력 완료`, 'success');
  } catch(e) {
    setParseStatus('❌ 파싱 실패: ' + e.message, 'error');
  } finally { btn.disabled = false; }
}

function applyParsed(data) {
  // 기존 노선 초기화
  routes = []; routeId = 0;
  document.getElementById('routesList').innerHTML = '';
  // 통화
  if(data.currency) {
    const sel = document.getElementById('currency');
    [...sel.options].forEach(o=>{ if(o.value===data.currency) sel.value=data.currency; });
  }
  if(data.exchangeRate && data.exchangeRate > 0) document.getElementById('exchangeRate').value = data.exchangeRate;
  // 노선 추가
  (data.routes||[]).forEach(r => {
    const id = addRoute(false);
    setRouteVal(id, 'trainNum', r.trainNumber||'');
    // 역명: 도시 + 역 조합
    const fromFull = [r.fromCity, r.fromStation].filter(Boolean).join(' — ') || r.fromStation || r.fromCity || '';
    const toFull = [r.toCity, r.toStation].filter(Boolean).join(' — ') || r.toStation || r.toCity || '';
    setRouteVal(id, 'from', fromFull);
    setRouteVal(id, 'to', toFull);
    setRouteVal(id, 'date', r.date||'');
    setRouteVal(id, 'depTime', r.departureTime||'');
    setRouteVal(id, 'arrTime', r.arrivalTime||'');
    setRouteVal(id, 'duration', r.duration||'');
    setRouteVal(id, 'cls', r.class||'Standard');
    setRouteVal(id, 'pax', r.pax||1);
    setRouteVal(id, 'price', r.pricePerPax||0);
    setRouteVal(id, 'note', r.note||'');
  });
  render();
}
function setRouteVal(id, field, val) {
  const el = document.getElementById(`r${id}_${field}`);
  if(el) el.value = val;
}

// ─── 노선 추가/삭제 ──────────────────────────
function addRoute(doRender=true) {
  const id = routeId++;
  routes.push(id);
  const num = routes.indexOf(id)+1;
  const div = document.createElement('div');
  div.className = 'route-item'; div.id = `route-${id}`;
  div.innerHTML = `
    <div class="route-item-header">
      <span>🚂 구간 #${num}</span>
      <button class="remove-btn" onclick="removeRoute(${id})">✕ 삭제</button>
    </div>
    <div class="row2">
      <div class="form-row"><label>기차편명</label>
        <input id="r${id}_trainNum" placeholder="예: ES 9021, ICE 123" oninput="render()"></div>
      <div class="form-row"><label>좌석 등급</label>
        <input id="r${id}_cls" placeholder="Standard / Business Premier / First" oninput="render()"></div>
    </div>
    <div class="row2">
      <div class="form-row"><label>출발역</label>
        <input id="r${id}_from" placeholder="예: London St Pancras" oninput="render()"></div>
      <div class="form-row"><label>도착역</label>
        <input id="r${id}_to" placeholder="예: Paris Gare du Nord" oninput="render()"></div>
    </div>
    <div class="row4">
      <div class="form-row"><label>출발일</label>
        <input type="date" id="r${id}_date" oninput="render()"></div>
      <div class="form-row"><label>출발시간</label>
        <input type="time" id="r${id}_depTime" oninput="render()"></div>
      <div class="form-row"><label>도착시간</label>
        <input type="time" id="r${id}_arrTime" oninput="render()"></div>
      <div class="form-row"><label>소요시간</label>
        <input id="r${id}_duration" placeholder="2h 16m" oninput="render()"></div>
    </div>
    <div class="route-divider"></div>
    <div class="row3">
      <div class="form-row"><label>인원(pax)</label>
        <input type="number" id="r${id}_pax" value="1" min="1" oninput="render()"></div>
      <div class="form-row"><label>단가</label>
        <input type="number" id="r${id}_price" value="0" step="0.01" oninput="render()"></div>
      <div class="form-row"><label>소계</label>
        <input id="r${id}_sub" readonly></div>
    </div>
  `;
  document.getElementById('routesList').appendChild(div);
  if(doRender) render();
  return id;
}

function removeRoute(id) {
  routes = routes.filter(r=>r!==id);
  document.getElementById(`route-${id}`).remove();
  render();
}

// ─── 유틸 ────────────────────────────────────
function fmt(n,d=2){return Number(n).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtKrw(n){return Math.round(n).toLocaleString('ko-KR')}
function gv(id){const el=document.getElementById(id);return el?el.value:'';}

// ─── 렌더링 ──────────────────────────────────
function render() {
  const cur = gv('currency');
  document.getElementById('currLabel').textContent = cur;
  const rate = parseFloat(gv('exchangeRate'))||0;
  const invNo = gv('invNo');
  const invDate = gv('invDate');
  const inclPolicy = document.getElementById('inclPolicy').checked;

  let totalFX = 0;
  const routeData = routes.map(id=>{
    const trainNum = gv(`r${id}_trainNum`);
    const from = gv(`r${id}_from`);
    const to = gv(`r${id}_to`);
    const date = gv(`r${id}_date`);
    const depTime = gv(`r${id}_depTime`);
    const arrTime = gv(`r${id}_arrTime`);
    const duration = gv(`r${id}_duration`);
    const cls = gv(`r${id}_cls`);
    const pax = parseInt(gv(`r${id}_pax`))||0;
    const price = parseFloat(gv(`r${id}_price`))||0;
    const sub = pax * price;
    const subEl = document.getElementById(`r${id}_sub`);
    if(subEl) subEl.value = fmt(sub);
    totalFX += sub;
    return {trainNum,from,to,date,depTime,arrTime,duration,cls,pax,price,sub};
  });

  // 수수료 계산
  const totalPax = routeData.reduce((s,r)=>s+r.pax, 0);
  let totalFee = 0;
  const feeData = fees.map(id=>{
    const name = gv(`f${id}_name`)||'수수료';
    const price = parseFloat(gv(`f${id}_price`))||0;
    const isAuto = document.getElementById(`f${id}_auto`)?.checked;
    const qty = isAuto ? totalPax : (parseInt(gv(`f${id}_qty`))||1);
    // auto 체크 시 qty input 비활성화
    const qtyEl = document.getElementById(`f${id}_qty`);
    if(qtyEl) { qtyEl.value = qty; qtyEl.readOnly = isAuto; }
    const sub = price * qty;
    const subEl = document.getElementById(`f${id}_sub`);
    if(subEl) subEl.value = fmt(sub);
    totalFee += sub;
    return {name, price, qty, sub};
  });
  const grandTotal = totalFX + totalFee;

  document.getElementById('calcBox').innerHTML=`
    <div class="calc-row"><span>티켓 합계 (${cur})</span><span>${fmt(totalFX)} ${cur}</span></div>
    ${totalFee>0?`<div class="calc-row"><span>수수료 합계 (${cur})</span><span>${fmt(totalFee)} ${cur}</span></div>`:''}
    <div class="calc-row total"><span>총합계 (${cur})</span><span><b>${fmt(grandTotal)} ${cur}</b></span></div>
    <div class="calc-row krw"><span>환산 KRW (1${cur}=₩${fmtKrw(rate)})</span><span>₩${fmtKrw(grandTotal*rate)}</span></div>`;

  // 날짜 포맷
  let dateStr = invDate;
  if(invDate){
    const d=new Date(invDate);
    const mo=['January','February','March','April','May','June','July','August','September','October','November','December'][d.getMonth()];
    dateStr=`${mo} ${d.getDate()}, ${d.getFullYear()}`;
  }

  // 테이블 행
  const tableRows = routeData.map(r=>{
    const dateDisp = r.date ? new Date(r.date+'T00:00:00').toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}) : '—';
    const timeParts = [];
    if(r.depTime||r.arrTime) timeParts.push(`${r.depTime||'—'} → ${r.arrTime||'—'}`);
    if(r.duration) timeParts.push(`(${r.duration})`);
    const timeDisp = timeParts.join(' ') || '—';
    return `<tr>
      <td><span class="train-num">${r.trainNum||'—'}</span><br><span class="mono">${r.cls||''}</span></td>
      <td><b>${r.from||'—'}</b><span class="station-arrow">→</span><b>${r.to||'—'}</b><br><span class="mono">${dateDisp} &nbsp; ${timeDisp}</span></td>
      <td class="num">${r.pax}</td>
      <td class="num">${cur} ${fmt(r.price)}</td>
      <td class="num"><b>${cur} ${fmt(r.sub)}</b></td>
    </tr>`;
  }).join('');

  const policyHtml = inclPolicy ? `<div class="policy-box"><h3>📋 환불 · 변경 규정</h3>${gv('policyText').split('\n').map(l=>l.trim()?`<p>${l}</p>`:'').join('')}</div>` : '';
  const memo = gv('memo');
  const memoHtml = memo ? `<div class="memo-box"><h3>📝 메모</h3>${memo.split('\n').map(l=>`<p>${l}</p>`).join('')}</div>` : '';
  const imgHtml = scheduleImgDataUrl ? `<div class="inv-schedule-img"><img src="${scheduleImgDataUrl}" alt="스케줄"></div>` : '';

  document.getElementById('invoicePaper').innerHTML = `
    <div class="inv-header">
      <div>
        <div class="inv-logo">DIPLAT <span>KOREA</span><small>${COMPANY.address}</small><small>사업자등록번호: ${COMPANY.regNo} | 대표: ${COMPANY.repName}</small></div>
      </div>
      <div class="inv-title">
        <h1>INVOICE</h1>
        <p>Invoice #: <b>${invNo||'DPL-RAIL-XXXXXXXX-XX'}</b><br>Date: <b>${dateStr||'—'}</b></p>
      </div>
    </div>
    <div class="inv-meta">
      <div class="meta-box"><h3>CLIENT</h3>
        <p><strong>${gv('clientCompany')||'—'}</strong><br>Name: ${gv('clientName')||'—'}<br>Contact: ${gv('clientPhone')||'—'}<br>E-mail: ${gv('clientEmail')||'—'}</p></div>
      <div class="meta-box"><h3>ISSUED BY</h3>
        <p><strong>${COMPANY.name}</strong> (${COMPANY.nameKo})<br>대표: ${COMPANY.repName} | 사업자: ${COMPANY.regNo}<br><span style="font-size:7pt;color:#888">${RAILCLICK.name} | ${RAILCLICK.phone}<br>${RAILCLICK.email1} / ${RAILCLICK.email2}</span></p></div>
    </div>
    ${imgHtml}
    <table class="inv-table">
      <thead><tr>
        <th>기차편 / 등급</th><th>노선 · 일정</th>
        <th class="num">인원</th><th class="num">단가</th><th class="num">소계</th>
      </tr></thead>
      ${tableRows||'<tr><td colspan="6" style="text-align:center;color:#aaa;padding:14px">노선을 추가하세요</td></tr>'}
      ${feeData.map(f=>`<tr class="inv-fee-row">
        <td colspan="2"><span style="font-size:7.5pt;color:#888">▶ ${f.name}</span></td>
        <td class="num">${f.qty}</td>
        <td class="num">${cur} ${fmt(f.price)}</td>
        <td class="num">${cur} ${fmt(f.sub)}</td>
      </tr>`).join('')}
      </tbody>
    </table>
    ${policyHtml}${memoHtml}
    <div class="inv-total"><div class="total-box">
      <div class="total-row sub"><span>환율</span><span class="amt">1 ${cur} = ₩${fmtKrw(rate)}</span></div>
      ${totalFee>0?`<div class="total-row sub"><span>티켓</span><span class="amt">${cur} ${fmt(totalFX)}</span></div><div class="total-row sub"><span>수수료</span><span class="amt">${cur} ${fmt(totalFee)}</span></div>`:''}
      <div class="total-row big"><span>${cur} TOTAL</span><span class="amt">${cur} ${fmt(grandTotal)}</span></div>
      <div class="total-row"><span>KRW 환산</span><span class="amt">₩${fmtKrw(grandTotal*rate)}</span></div>
    </div></div>
    <div class="inv-bank">
      <div class="bank-box"><h3>🏦 ${cur} 송금 계좌</h3>
        <p>은행: <b>${BANK.fx.bank}</b><br>계좌번호: <b>${BANK.fx.no}</b><br>예금주: ${BANK.fx.holder}</p></div>
      <div class="bank-box"><h3>🏦 원화(KRW) 송금 계좌</h3>
        <p>은행: <b>${BANK.krw.bank}</b><br>계좌번호: <b>${BANK.krw.no}</b><br>예금주: ${BANK.krw.holder}</p></div>
    </div>
    <div class="inv-footer">
      <div class="company-info"><p><b>${COMPANY.name}</b> | ${COMPANY.regNo}</p><p>${COMPANY.address}</p></div>
      <div class="contact-info"><p>레일클릭 | ${RAILCLICK.phone}</p><p>${RAILCLICK.email1} / ${RAILCLICK.email2}</p></div>
    </div>`;
}

function resetForm() {
  if(!confirm('초기화하시겠습니까?')) return;
  routes=[]; routeId=0;
  fees=[]; feeId=0;
  document.getElementById('routesList').innerHTML='';
  document.getElementById('feeList').innerHTML='';
  ['clientCompany','clientName','clientPhone','clientEmail','memo'].forEach(id=>document.getElementById(id).value='');
  clearImg(); init();
}

function init() {
  const now = new Date();
  const ymd = now.toISOString().slice(0,10);
  document.getElementById('invDate').value = ymd;
  document.getElementById('invNo').value = `DPL-RAIL-${ymd.replace(/-/g,'')}-${String(Math.floor(Math.random()*90)+10)}`;
  document.querySelectorAll('input,select,textarea').forEach(el=>{
    el.addEventListener('input', render);
    el.addEventListener('change', render);
  });
  // 클립보드 붙여넣기
  document.addEventListener('paste', e=>{
    const items = e.clipboardData?.items;
    if(!items) return;
    for(const item of items) if(item.type.startsWith('image/')){readImgFile(item.getAsFile());break;}
  });
  // 드래그 앤 드롭
  const dz = document.getElementById('dropzone');
  dz.addEventListener('dragover', e=>{e.preventDefault();dz.classList.add('drag-over');});
  dz.addEventListener('dragleave', ()=>dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e=>{e.preventDefault();dz.classList.remove('drag-over');if(e.dataTransfer.files[0])readImgFile(e.dataTransfer.files[0]);});
  refreshAgencySelect();
  addRoute();
  render();
}
init();
</script>
