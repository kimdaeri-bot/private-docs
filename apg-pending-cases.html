<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta http-equiv="refresh" content="60">
  <title>APG 팬딩케이스 관리</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#0f1623;color:#e0e6f0;min-height:100vh}
    header{background:linear-gradient(135deg,#0a2540,#1a1a2e);padding:28px 40px 20px;border-bottom:2px solid #2a2a4a}
    header h1{font-size:22px;font-weight:900;color:#fff;margin-bottom:4px}
    header p{font-size:12px;color:rgba(255,255,255,.45)}
    .container{max-width:1200px;margin:0 auto;padding:32px 24px}
    .stats{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap}
    .stat{background:#1a2536;border:1px solid #243040;border-radius:10px;padding:16px 24px;flex:1;min-width:140px;text-align:center}
    .stat-num{font-size:28px;font-weight:900}
    .stat-label{font-size:11px;color:#6a8aaa;margin-top:4px;letter-spacing:.5px}
    .s-wait{color:#f59e0b}.s-done{color:#22c55e}.s-total{color:#e0e6f0}
    table{width:100%;border-collapse:collapse;background:#1a2536;border-radius:12px;overflow:hidden;border:1px solid #243040}
    thead{background:#0d2347}
    th{padding:12px 14px;text-align:left;font-size:12px;font-weight:700;color:#8ab4f8;letter-spacing:.5px;white-space:nowrap}
    td{padding:10px 14px;font-size:13px;border-top:1px solid #1e2e40;vertical-align:top}
    .td-seq{font-weight:900;color:#7c5cbf;font-size:14px;text-align:center;white-space:nowrap}
    tbody tr:hover{background:#1e2e40}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
    .b-wait{background:#422006;color:#fbbf24}
    .b-done{background:#052e16;color:#4ade80}
    .td-content{max-width:350px;line-height:1.6;color:#b0c4d8}
    .td-date{white-space:nowrap;color:#7a9ab8;font-size:12px}
    .td-airline{font-weight:700;color:#e0e6f0;white-space:nowrap}
    .td-mail{font-family:'SF Mono',monospace;font-size:12px;color:#a78bfa;white-space:nowrap}
    .empty-msg{text-align:center;padding:60px 20px;color:#3a5060;font-size:14px}
    .updated{font-size:11px;color:#3a5060;text-align:right;margin-top:24px}
    .form-wrap{background:#1a2536;border:1px solid #243040;border-radius:12px;padding:24px;margin-bottom:28px}
    .form-title{font-size:16px;font-weight:700;color:#8ab4f8;margin-bottom:16px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .form-grid .full{grid-column:1/-1}
    .form-grid label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:#6a8aaa;font-weight:600}
    .form-grid input,.form-grid textarea{background:#0f1623;border:1px solid #2a3a50;border-radius:8px;padding:10px 12px;color:#e0e6f0;font-size:13px;font-family:inherit;outline:none}
    .form-grid input:focus,.form-grid textarea:focus{border-color:#7c5cbf}
    .form-grid textarea{resize:vertical;min-height:60px}
    .btn-add{background:#7c5cbf;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:16px;font-family:inherit}
    .btn-add:hover{background:#9b7ed8}
    .btn-del{background:transparent;border:1px solid #f87171;color:#f87171;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}
    .btn-del:hover{background:#f87171;color:#fff}
    .btn-status{background:transparent;border:1px solid #4ade80;color:#4ade80;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}
    .btn-status:hover{background:#4ade80;color:#0f1623}
    @media(max-width:640px){.form-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <h1>📋 APG 팬딩케이스 관리</h1>
      <p>본사 답변 대기 케이스 — 근아차장님 공유</p>
    </div>
    <button onclick="location.reload()" style="background:#7c5cbf;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">🔄 새로고침</button>
  </div>
</header>
<div class="container">
  <div class="form-wrap">
    <div class="form-title">＋ 새 케이스 등록</div>
    <div class="form-grid">
      <label>메일번호<input id="f-mail" placeholder="#7599"></label>
      <label>시작날짜<input id="f-start" type="date"></label>
      <label>항공사<input id="f-airline" placeholder="TC, AT, SZ…"></label>
      <label class="full">내용<textarea id="f-content" rows="2"></textarea></label>
    </div>
    <button class="btn-add" onclick="addCase()">등록</button>
  </div>
  <div class="stats" id="stats"></div>
  <table>
    <thead>
      <tr>
        <th>번호</th>
        <th>메일번호</th>
        <th>시작날짜</th>
        <th>항공사</th>
        <th>내용</th>
        <th>상태</th>
        <th>완료날짜</th>
        <th>관리</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty-msg" id="empty">등록된 케이스가 없습니다.</div>
  <div class="updated" id="updated"></div>
</div>
<script>
const DEFAULT_CASES = [
  {mail:"#7509",start:"2026-04-06",airline:"TC",content:"TK로 인한 MCT SHORT 케이스. 홍영애(투어컬쳐) 요청. TC에 메일 발송했으나 답변 미수신. 여행사 2차 재촉 상태. ★ TC본사 여러 차례 연락 시도했으나 연결 안 됨. 여행사 측 급하므로 INVOL 재발권 안내 완료. 단, ADM에 대해서는 APG 개런티 불가 안내. 추후 TC 본사 연락 오면 즉시 회신 예정. (14APR)",status:"완료",done:"17APR"},
  {mail:"#7510",start:"2026-04-08",airline:"TC",content:"TK로 인한 MCT SHORT 케이스. 박진선(여기어때) 요청. TC에 메일 발송했으나 답변 미수신. ★ TC본사 여러 차례 연락 시도했으나 연결 안 됨. 여행사 측 급하므로 INVOL 재발권 안내 완료. 단, ADM에 대해서는 APG 개런티 불가 안내. 추후 TC 본사 연락 오면 즉시 회신 예정. (14APR)",status:"완료",done:"17APR"},
  {mail:"#7346",start:"2026-03-06",airline:"AT",content:"갑작스런 커미션 변경으로 인한 컴플레인. 이영롱 과장(와이페이모어) KRW 171,016 보상 요구. 베니에게 메일 발송했으나 권부장님 출장 중이라 베니와 논의 예정.",status:"대기",done:"-"},
  {mail:"#7403",start:"2026-03-17",airline:"GP (ID)",content:"공항에서 티켓이 안 보여 탑승 거부된 사례. 김경영(하나투어부산). 본사 확인 중이며 확인 후 연락 예정.",status:"대기",done:"-"},
  {mail:"#7599",start:"2026-04-23",airline:"SZ",content:"SZ 당일 헤비딜레이로 인한 환불문의 중",status:"대기",done:"-"}
];

let cases;
try { cases = JSON.parse(localStorage.getItem('apg-cases')) || [...DEFAULT_CASES]; }
catch(e) { cases = [...DEFAULT_CASES]; }
if(!localStorage.getItem('apg-cases')) localStorage.setItem('apg-cases', JSON.stringify(cases));

function saveCases(){ localStorage.setItem('apg-cases', JSON.stringify(cases)); }

function addCase(){
  const m=document.getElementById('f-mail').value.trim();
  const s=document.getElementById('f-start').value;
  const a=document.getElementById('f-airline').value.trim();
  const c=document.getElementById('f-content').value.trim();
  if(!c){alert('내용을 입력해주세요');return}
  cases.unshift({mail:m||'-',start:s||'-',airline:a||'-',content:c,status:'대기',done:'-'});
  saveCases(); render();
  document.getElementById('f-mail').value='';
  document.getElementById('f-start').value='';
  document.getElementById('f-airline').value='';
  document.getElementById('f-content').value='';
}

function toggleStatus(i){
  if(cases[i].status==='대기'){
    cases[i].status='완료';
    const d=prompt('완료날짜 입력 (예: 30APR):','');
    cases[i].done=d||'-';
  } else {
    cases[i].status='대기'; cases[i].done='-';
  }
  saveCases(); render();
}

function deleteCase(i){
  if(confirm('삭제하시겠습니까?')){cases.splice(i,1);saveCases();render()}
}

function render(){
  const tbody=document.getElementById('tbody');
  const empty=document.getElementById('empty');
  const statsEl=document.getElementById('stats');
  const updatedEl=document.getElementById('updated');
  tbody.innerHTML='';
  if(cases.length===0){
    empty.style.display='block';
    document.querySelector('table').style.display='none';
  } else {
    empty.style.display='none';
    document.querySelector('table').style.display='';
    cases.forEach((c,i)=>{
      const tr=document.createElement('tr');
      const bc=c.status==='대기'?'b-wait':'b-done';
      tr.innerHTML=`
        <td class="td-seq">${i+1}</td>
        <td class="td-mail">${c.mail||'-'}</td>
        <td class="td-date">${c.start||'-'}</td>
        <td class="td-airline">${c.airline||'-'}</td>
        <td class="td-content">${c.content||'-'}</td>
        <td><span class="badge ${bc}">${c.status||'-'}</span></td>
        <td class="td-date">${c.done||'-'}</td>
        <td style="white-space:nowrap">
          <button class="btn-status" onclick="toggleStatus(${i})">상태변경</button>
          <button class="btn-del" onclick="deleteCase(${i})">삭제</button>
        </td>`;
      tbody.appendChild(tr);
    });
    const wait=cases.filter(c=>c.status==='대기').length;
    const done=cases.filter(c=>c.status==='완료').length;
    statsEl.innerHTML=`
      <div class="stat"><div class="stat-num s-total">${cases.length}</div><div class="stat-label">전체</div></div>
      <div class="stat"><div class="stat-num s-wait">${wait}</div><div class="stat-label">대기</div></div>
      <div class="stat"><div class="stat-num s-done">${done}</div><div class="stat-label">완료</div></div>`;
  }
  updatedEl.textContent='마지막 업데이트: '+new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'});
}
render();
</script>
</body>
</html>
