<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <title>APG 팬딩케이스 관리</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#0f1623;color:#e0e6f0;min-height:100vh}
    header{background:linear-gradient(135deg,#0a2540,#1a1a2e);padding:28px 40px 20px;border-bottom:2px solid #2a2a4a}
    header h1{font-size:22px;font-weight:900;color:#fff;margin-bottom:4px}
    header p{font-size:12px;color:rgba(255,255,255,.45)}
    .container{max-width:1200px;margin:0 auto;padding:32px 24px}
    .stats{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap}
    .stat{background:#1a2536;border:1px solid #243040;border-radius:10px;padding:16px 24px;flex:1;min-width:140px;text-align:center}
    .stat-num{font-size:28px;font-weight:900}
    .stat-label{font-size:11px;color:#6a8aaa;margin-top:4px;letter-spacing:.5px}
    .s-wait{color:#f59e0b}.s-done{color:#22c55e}.s-total{color:#e0e6f0}.s-archive{color:#8ab4f8}
    table{width:100%;border-collapse:collapse;background:#1a2536;border-radius:12px;overflow:hidden;border:1px solid #243040}
    thead{background:#0d2347}
    th{padding:12px 14px;text-align:left;font-size:12px;font-weight:700;color:#8ab4f8;letter-spacing:.5px;white-space:nowrap}
    td{padding:10px 14px;font-size:13px;border-top:1px solid #1e2e40;vertical-align:top}
    .td-seq{font-weight:900;color:#7c5cbf;font-size:14px;text-align:center;white-space:nowrap}
    tbody tr:hover{background:#1e2e40}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
    .b-wait{background:#422006;color:#fbbf24}
    .b-done{background:#052e16;color:#4ade80}
    .td-content{max-width:350px;line-height:1.6;color:#b0c4d8}
    .td-date{white-space:nowrap;color:#7a9ab8;font-size:12px}
    .td-airline{font-weight:700;color:#e0e6f0;white-space:nowrap}
    .td-mail{font-family:'SF Mono',monospace;font-size:12px;color:#a78bfa;white-space:nowrap}
    .empty-msg{text-align:center;padding:60px 20px;color:#3a5060;font-size:14px}
    .updated{font-size:11px;color:#3a5060;text-align:right;margin-top:24px}
    .form-wrap{background:#1a2536;border:1px solid #243040;border-radius:12px;padding:24px;margin-bottom:28px}
    .form-title{font-size:16px;font-weight:700;color:#8ab4f8;margin-bottom:16px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
    .form-grid .full{grid-column:1/-1}
    .form-grid label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:#6a8aaa;font-weight:600}
    .form-grid input,.form-grid textarea{background:#0f1623;border:1px solid #2a3a50;border-radius:8px;padding:10px 12px;color:#e0e6f0;font-size:13px;font-family:inherit;outline:none}
    .form-grid input:focus,.form-grid textarea:focus{border-color:#7c5cbf}
    .form-grid textarea{resize:vertical;min-height:60px}
    .btn-add{background:#7c5cbf;color:#fff;border:none;padding:12px 28px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;margin-top:16px;font-family:inherit}
    .btn-add:hover{background:#9b7ed8}
    .btn-del{background:transparent;border:1px solid #f87171;color:#f87171;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}
    .btn-del:hover{background:#f87171;color:#fff}
    .btn-archive{background:transparent;border:1px solid #8ab4f8;color:#8ab4f8;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}
    .btn-archive:hover{background:#8ab4f8;color:#0f1623}
    .btn-restore{background:transparent;border:1px solid #fbbf24;color:#fbbf24;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}
    .btn-restore:hover{background:#fbbf24;color:#0f1623}
    [data-field]{cursor:pointer;border-radius:4px;padding:2px 4px;margin:-2px -4px;transition:background .15s}
    [data-field]:hover{background:rgba(124,92,191,.25)}
    .edit-input{background:#0f1623;border:1px solid #7c5cbf;border-radius:4px;color:#e0e6f0;font-size:13px;font-family:inherit;padding:4px 6px;width:100%;outline:none}
    .edit-textarea{background:#0f1623;border:1px solid #7c5cbf;border-radius:4px;color:#e0e6f0;font-size:13px;font-family:inherit;padding:4px 6px;width:100%;outline:none;min-height:50px;resize:vertical}
    .section-header{display:flex;justify-content:space-between;align-items:center;margin:36px 0 16px;cursor:pointer;user-select:none}
    .section-header h2{font-size:18px;font-weight:700;color:#8ab4f8}
    .section-header .arrow{font-size:14px;color:#6a8aaa;transition:transform .2s}
    .section-header.collapsed .arrow{transform:rotate(-90deg)}
    .archive-section .table-wrap{overflow:hidden;transition:max-height .3s ease}
    .archive-section.collapsed .table-wrap{max-height:0 !important}
    @media(max-width:640px){.form-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header>
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <h1>📋 APG 팬딩케이스 관리</h1>
      <p>본사 답변 대기 케이스 — 근아차장님 공유</p>
    </div>
    <button onclick="location.reload()" style="background:#7c5cbf;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">🔄 새로고침</button>
  </div>
</header>
<div class="container">
  <div class="form-wrap">
    <div class="form-title">＋ 새 케이스 등록</div>
    <div class="form-grid">
      <label>메일번호 (또는 PNR)<input id="f-mail" placeholder="#7599"></label>
      <label>시작날짜<input id="f-start" placeholder="예: 04-30 → 2026-04-30" onblur="autoDate(this)"></label>
      <label>항공사<input id="f-airline" placeholder="TC, AT, SZ…"></label>
      <label>담당자<input id="f-person" placeholder="홍길동"></label>
      <label class="full">내용<textarea id="f-content" rows="2"></textarea></label>
    </div>
    <button class="btn-add" onclick="addCase()">등록</button>
  </div>
  <div class="stats" id="stats"></div>
  <table>
    <thead>
      <tr>
        <th>번호</th>
        <th>메일번호(PNR)</th>
        <th>시작날짜</th>
        <th>항공사</th>
        <th>담당자</th>
        <th>내용</th>
        <th>상태</th>
        <th>관리</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty-msg" id="empty">등록된 케이스가 없습니다.</div>

  <div class="archive-section" id="archiveSection">
    <div class="section-header" id="archiveHeader" onclick="toggleArchive()">
      <h2>📁 완료 케이스 보관함 (<span id="archiveCount">0</span>)</h2>
      <span class="arrow">▼</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>번호</th>
            <th>메일번호(PNR)</th>
            <th>시작날짜</th>
            <th>항공사</th>
            <th>담당자</th>
            <th>내용</th>
            <th>완료날짜</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="archiveBody"></tbody>
      </table>
      <div class="empty-msg" id="archiveEmpty">보관된 케이스가 없습니다.</div>
    </div>
  </div>

  <div class="updated" id="updated"></div>
</div>
<script>
const DEFAULT_CASES = [
  {mail:"#7346",start:"2026-03-06",airline:"AT",person:"-",content:"갑작스런 커미션 변경으로 인한 컴플레인. 이영롱 과장(와이페이모어) KRW 171,016 보상 요구. 베니에게 메일 발송했으나 권부장님 출장 중이라 베니와 논의 예정.",status:"대기",done:"-"},
  {mail:"#7403",start:"2026-03-17",airline:"GP (ID)",person:"-",content:"공항에서 티켓이 안 보여 탑승 거부된 사례. 김경영(하나투어부산). 본사 확인 중이며 확인 후 연락 예정.",status:"대기",done:"-"},
  {mail:"#7599",start:"2026-04-23",airline:"SZ",person:"-",content:"SZ 당일 헤비딜레이로 인한 환불문의 중",status:"대기",done:"-"}
];
const DEFAULT_ARCHIVE = [
  {mail:"#7509",start:"2026-04-06",airline:"TC",person:"-",content:"TK로 인한 MCT SHORT 케이스. 홍영애(투어컬쳐) 요청. TC에 메일 발송했으나 답변 미수신. 여행사 2차 재촉 상태. ★ TC본사 여러 차례 연락 시도했으나 연결 안 됨. 여행사 측 급하므로 INVOL 재발권 안내 완료. 단, ADM에 대해서는 APG 개런티 불가 안내. 추후 TC 본사 연락 오면 즉시 회신 예정. (14APR)",status:"완료",done:"17APR"},
  {mail:"#7510",start:"2026-04-08",airline:"TC",person:"-",content:"TK로 인한 MCT SHORT 케이스. 박진선(여기어때) 요청. TC에 메일 발송했으나 답변 미수신. ★ TC본사 여러 차례 연락 시도했으나 연결 안 됨. 여행사 측 급하므로 INVOL 재발권 안내 완료. 단, ADM에 대해서는 APG 개런티 불가 안내. 추후 TC 본사 연락 오면 즉시 회신 예정. (14APR)",status:"완료",done:"17APR"}
];

let cases, archive;
function load(){
  try{cases=JSON.parse(localStorage.getItem('apg-cases'))||[...DEFAULT_CASES]}catch(e){cases=[...DEFAULT_CASES]}
  try{archive=JSON.parse(localStorage.getItem('apg-archive'))||null}catch(e){archive=null}
  if(archive===null){archive=[...DEFAULT_ARCHIVE];localStorage.setItem('apg-archive',JSON.stringify(archive))}
  if(!localStorage.getItem('apg-cases'))localStorage.setItem('apg-cases',JSON.stringify(cases));
}
load();
function save(){localStorage.setItem('apg-cases',JSON.stringify(cases));localStorage.setItem('apg-archive',JSON.stringify(archive))}

function autoDate(el){
  let v=el.value.trim();
  if(!v)return;
  v=v.replace(/\./g,'-').replace(/\//g,'-');
  const m=v.match(/^(\d{1,2})-(\d{1,2})$/);
  if(m)v='2026-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');
  el.value=v;
}

function addCase(){
  const m=document.getElementById('f-mail').value.trim();
  const s=document.getElementById('f-start').value;
  const a=document.getElementById('f-airline').value.trim();
  const p=document.getElementById('f-person').value.trim();
  const c=document.getElementById('f-content').value.trim();
  if(!c){alert('내용을 입력해주세요');return}
  cases.unshift({mail:m||'-',start:s||'-',airline:a||'-',person:p||'-',content:c,status:'대기',done:'-'});
  save();render();
  document.getElementById('f-mail').value='';
  document.getElementById('f-start').value='';
  document.getElementById('f-airline').value='';
  document.getElementById('f-person').value='';
  document.getElementById('f-content').value='';
}

function completeCase(i){
  const d=prompt('완료날짜 입력 (예: 30APR):','');
  if(!d)return;
  cases[i].status='완료';cases[i].done=d;
  archive.unshift(cases.splice(i,1)[0]);
  save();render();
}
function restoreCase(i){
  archive[i].status='대기';archive[i].done='-';
  cases.unshift(archive.splice(i,1)[0]);
  save();render();
}
function deleteActive(i){if(confirm('삭제하시겠습니까?')){cases.splice(i,1);save();render()}}
function deleteArchive(i){if(confirm('보관함에서 삭제하시겠습니까?')){archive.splice(i,1);save();render()}}

function editCell(el,source,idx,field){
  if(el.querySelector('input,textarea'))return;
  const list=source==='active'?cases:archive;
  const c=list[idx];
  const val=(c[field]==='-')?'':c[field];
  const isLong=field==='content';
  const inp=document.createElement(isLong?'textarea':'input');
  inp.className=isLong?'edit-textarea':'edit-input';
  inp.value=val;
  el.textContent='';
  el.appendChild(inp);
  inp.focus();
  function finish(){
    let v=inp.value.trim();
    if(field==='start'&&v){autoDate(inp);v=inp.value.trim()}
    c[field]=v||'-';
    save();render();
  }
  inp.addEventListener('blur',finish);
  if(!isLong)inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();finish()}});
}

let archiveOpen=true;
function toggleArchive(){
  archiveOpen=!archiveOpen;
  const sec=document.getElementById('archiveSection');
  const hdr=document.getElementById('archiveHeader');
  sec.classList.toggle('collapsed',!archiveOpen);
  hdr.classList.toggle('collapsed',!archiveOpen);
}

function makeCell(cls,source,i,field,val,extra){
  const style=extra?`class="${cls}" style="${extra}"`:`class="${cls}"`;
  return `<td ${style} data-field onclick="editCell(this,'${source}',${i},'${field}')">${val||'-'}</td>`;
}

function render(){
  const tbody=document.getElementById('tbody');
  const empty=document.getElementById('empty');
  const statsEl=document.getElementById('stats');
  const aBody=document.getElementById('archiveBody');
  const aEmpty=document.getElementById('archiveEmpty');
  const aCount=document.getElementById('archiveCount');
  const updatedEl=document.getElementById('updated');

  tbody.innerHTML='';
  if(cases.length===0){empty.style.display='block';document.querySelector('table').style.display='none'}
  else{
    empty.style.display='none';document.querySelector('table').style.display='';
    cases.forEach((c,i)=>{
      const bc=c.status==='대기'?'b-wait':'b-done';
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td class="td-seq">${i+1}</td>
        ${makeCell('td-mail','active',i,'mail',c.mail)}
        ${makeCell('td-date','active',i,'start',c.start)}
        ${makeCell('td-airline','active',i,'airline',c.airline)}
        <td data-field onclick="editCell(this,'active',${i},'person')" style="white-space:nowrap;color:#c4b5fd;font-size:12px">${c.person||'-'}</td>
        ${makeCell('td-content','active',i,'content',c.content)}
        <td><span class="badge ${bc}">${c.status||'-'}</span></td>
        <td style="white-space:nowrap">
          <button class="btn-archive" onclick="completeCase(${i})">📁 보관</button>
          <button class="btn-del" onclick="deleteActive(${i})">🗑️</button>
        </td>`;
      tbody.appendChild(tr);
    });
  }

  const wait=cases.filter(c=>c.status==='대기').length;
  statsEl.innerHTML=`
    <div class="stat"><div class="stat-num s-total">${cases.length}</div><div class="stat-label">활성</div></div>
    <div class="stat"><div class="stat-num s-wait">${wait}</div><div class="stat-label">대기</div></div>
    <div class="stat"><div class="stat-num s-archive">${archive.length}</div><div class="stat-label">보관</div></div>`;

  aBody.innerHTML='';
  aCount.textContent=archive.length;
  if(archive.length===0){aEmpty.style.display='block';aBody.parentElement.style.display='none'}
  else{
    aEmpty.style.display='none';aBody.parentElement.style.display='';
    archive.forEach((c,i)=>{
      const tr=document.createElement('tr');
      tr.innerHTML=`
        <td class="td-seq">${i+1}</td>
        ${makeCell('td-mail','archive',i,'mail',c.mail)}
        ${makeCell('td-date','archive',i,'start',c.start)}
        ${makeCell('td-airline','archive',i,'airline',c.airline)}
        <td data-field onclick="editCell(this,'archive',${i},'person')" style="white-space:nowrap;color:#c4b5fd;font-size:12px">${c.person||'-'}</td>
        ${makeCell('td-content','archive',i,'content',c.content)}
        ${makeCell('td-date','archive',i,'done',c.done)}
        <td style="white-space:nowrap">
          <button class="btn-restore" onclick="restoreCase(${i})">↩ 복원</button>
          <button class="btn-del" onclick="deleteArchive(${i})">🗑️</button>
        </td>`;
      aBody.appendChild(tr);
    });
  }
  updatedEl.textContent='마지막 업데이트: '+new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'});
}
render();
</script>
</body>
</html>
