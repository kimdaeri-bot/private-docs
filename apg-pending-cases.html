<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <title>APG 팬딩케이스 관리</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
    header{background:linear-gradient(135deg,#1e3a5f,#2d5a87);padding:18px 28px 14px;border-bottom:2px solid #3b82f6}
    header h1{font-size:17px;font-weight:900;color:#fff;margin-bottom:2px}
    header p{font-size:10px;color:rgba(255,255,255,.7)}
    .container{max-width:900px;margin:0 auto;padding:20px 18px}
    .top-bar{display:flex;justify-content:flex-end;gap:12px;margin-bottom:24px}
    .filter-btn{display:flex;align-items:center;gap:6px;background:#fff;border:2px solid #e2e8f0;border-radius:8px;padding:8px 16px;cursor:pointer;transition:all .15s}
    .filter-btn:hover{border-color:#3b82f6;box-shadow:0 2px 8px rgba(59,130,246,.15)}
    .filter-btn.active{border-color:#3b82f6;background:#eff6ff}
    .filter-btn .f-num{font-size:18px;font-weight:900}
    .filter-btn .f-label{font-size:10px;color:#64748b}
    .f-wait .f-num{color:#d97706}
    .f-done .f-num{color:#16a34a}
    .f-all .f-num{color:#1e293b}
    .filter-btn.active.f-wait{background:#fffbeb;border-color:#f59e0b}
    .filter-btn.active.f-done{background:#f0fdf4;border-color:#22c55e}
    .filter-btn.active.f-all{background:#eff6ff;border-color:#3b82f6}
    table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;border:1px solid #e2e8f0;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    thead{background:#f1f5f9}
    th{padding:8px 10px;text-align:left;font-size:13px;font-weight:700;color:#3b82f6;letter-spacing:.5px;white-space:nowrap}
    td{padding:7px 10px;font-size:13px;border-top:1px solid #f1f5f9;vertical-align:top;color:#334155}
    .td-seq{font-weight:900;color:#6366f1;font-size:12px;text-align:center;white-space:nowrap}
    tbody tr:hover{background:#f8fafc}
    .badge{display:inline-block;padding:2px 8px;border-radius:16px;font-size:10px;font-weight:700;cursor:pointer}
    .b-wait{background:#fef3c7;color:#92400e}
    .b-done{background:#dcfce7;color:#166534}
    .td-content{max-width:250px;line-height:1.5;color:#475569}
    .td-date{white-space:nowrap;color:#64748b;font-size:11px}
    .td-airline{font-weight:700;color:#1e293b;white-space:nowrap;font-size:12px}
    .td-mail{font-family:'SF Mono',monospace;font-size:11px;color:#6366f1;white-space:nowrap}
    .empty-msg{text-align:center;padding:60px 20px;color:#94a3b8;font-size:14px}
    .updated{font-size:11px;color:#94a3b8;text-align:right;margin-top:24px}
    .form-wrap{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .form-title{font-size:14px;font-weight:700;color:#3b82f6;margin-bottom:10px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
    .form-grid .full{grid-column:1/-1}
    .form-grid label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:#64748b;font-weight:600}
    .form-grid input,.form-grid textarea{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:7px 8px;color:#1e293b;font-size:12px;font-family:inherit;outline:none}
    .form-grid input:focus,.form-grid textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,.15)}
    .form-grid textarea{resize:vertical;min-height:40px}
    .btn-add{background:#3b82f6;color:#fff;border:none;padding:8px 20px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;margin-top:10px;font-family:inherit}
    .btn-add:hover{background:#2563eb}
    .btn-del{background:transparent;border:1px solid #ef4444;color:#ef4444;padding:4px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit}
    .btn-del:hover{background:#ef4444;color:#fff}
    [data-field]{cursor:pointer;border-radius:4px;padding:2px 4px;margin:-2px -4px;transition:background .15s}
    [data-field]:hover{background:rgba(59,130,246,.1)}
    .edit-input{background:#fff;border:1px solid #3b82f6;border-radius:3px;color:#1e293b;font-size:12px;font-family:inherit;padding:3px 4px;width:100%;outline:none}
    .edit-textarea{background:#fff;border:1px solid #3b82f6;border-radius:3px;color:#1e293b;font-size:12px;font-family:inherit;padding:3px 4px;width:100%;outline:none;min-height:40px;resize:vertical}
    .section-header{display:flex;justify-content:space-between;align-items:center;margin:36px 0 16px;cursor:pointer;user-select:none}
    .section-header h2{font-size:18px;font-weight:700;color:#1e3a5f}
    .section-header .arrow{font-size:14px;color:#64748b;transition:transform .2s}
    .section-header.collapsed .arrow{transform:rotate(-90deg)}
    .archive-section .table-wrap{max-height:160px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#cbd5e1 #f1f5f9}
    .archive-section .table-wrap::-webkit-scrollbar{width:8px}
    .archive-section .table-wrap::-webkit-scrollbar-track{background:#f1f5f9;border-radius:4px}
    .archive-section .table-wrap::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:4px}
    .archive-section.collapsed .table-wrap{max-height:0 !important}
    .lang-btn{background:#fff;border:1px solid #e2e8f0;color:#64748b;padding:7px 12px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
    .lang-btn:hover{border-color:#3b82f6;color:#1e293b}
    @media(max-width:640px){.form-grid{grid-template-columns:1fr}.top-bar{justify-content:center}}
  </style>
</head>
<body>
<header>
  <div style="display:flex;justify-content:space-between;align-items:center">
    <div>
      <h1>📋 <span data-t="title">APG 팬딩케이스 관리</span></h1>
      <p data-t="subtitle">본사 답변 대기 케이스 — 근아차장님 공유</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="lang-btn" id="langBtn" onclick="toggleLang()">EN</button>
      <button onclick="location.reload()" style="background:#3b82f6;color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">🔄 새로고침</button>
    </div>
  </div>
</header>
<div class="container">
  <div class="form-wrap">
    <div class="form-title">＋ <span data-t="newCase">새 케이스 등록</span></div>
    <div class="form-grid">
      <label><span data-t="mailOrPnr">메일번호 (또는 PNR)</span><input id="f-mail" placeholder="#7599"></label>
      <label><span data-t="startDate">시작날짜</span><input id="f-start" placeholder="예: 04-30 → 2026-04-30" onblur="autoDate(this)"></label>
      <label><span data-t="airline">항공사</span><input id="f-airline" placeholder="TC, AT, SZ…"></label>
      <label><span data-t="person">담당자</span><input id="f-person" placeholder="홍길동"></label>
      <label class="full"><span data-t="content">내용</span><textarea id="f-content" rows="2"></textarea></label>
    </div>
    <button class="btn-add" onclick="addCase()" data-t="register">등록</button>
  </div>

  <div class="top-bar" id="topBar"></div>

  <!-- 대기 케이스 -->
  <table id="waitTable">
    <thead>
      <tr><th data-t="num">번호</th><th data-t="mailOrPnr2">메일번호 (or PNR)</th><th data-t="startDate">시작날짜</th><th data-t="airline">항공사</th><th data-t="person">담당자</th><th data-t="content">내용</th><th data-t="status">상태</th><th data-t="delete">삭제</th></tr>
    </thead>
    <tbody id="waitBody"></tbody>
  </table>
  <div class="empty-msg" id="waitEmpty">대기 케이스가 없습니다.</div>

  <!-- 완료 케이스 -->
  <div class="archive-section" id="archiveSection">
    <div class="section-header" id="archiveHeader" onclick="toggleArchive()">
      <h2>📁 완료 케이스 (<span id="archiveCount">0</span>) — 상태 클릭시 대기로 복원</h2>
      <span class="arrow">▼</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th data-t="num">번호</th><th data-t="mailOrPnr2">메일번호 (or PNR)</th><th data-t="startDate">시작날짜</th><th data-t="airline">항공사</th><th data-t="person">담당자</th><th data-t="content">내용</th><th data-t="doneDate">완료날짜</th><th data-t="status">상태</th><th data-t="delete">삭제</th></tr>
        </thead>
        <tbody id="doneBody"></tbody>
      </table>
      <div class="empty-msg" id="doneEmpty">완료 케이스가 없습니다.</div>
    </div>
  </div>

  <div class="updated" id="updated"></div>
</div>
<script>
let lang=localStorage.getItem('apg-lang')||'KR';
const T={
  KR:{title:'APG 팬딩케이스 관리',subtitle:'본사 답변 대기 케이스 — 근아차장님 공유',newCase:'새 케이스 등록',mailOrPnr:'메일번호 (또는 PNR)',mailOrPnr2:'메일번호 (or PNR)',startDate:'시작날짜',airline:'항공사',person:'담당자',content:'내용',status:'상태',delete:'삭제',register:'등록',num:'번호',doneDate:'완료날짜',wait:'대기',done:'완료',all:'전체',refresh:'🔄 새로고침',waitEmpty:'대기 케이스가 없습니다.',doneEmpty:'완료 케이스가 없습니다.',doneHeader:'📁 완료 케이스 — 상태 클릭시 대기로 복원'},
  EN:{title:'APG Pending Cases',subtitle:'Pending cases for HQ response',newCase:'New Case',mailOrPnr:'Mail No. (or PNR)',mailOrPnr2:'Mail No. (or PNR)',startDate:'Start Date',airline:'Airline',person:'PIC',content:'Content',status:'Status',delete:'Delete',register:'Register',num:'No.',doneDate:'Done Date',wait:'Pending',done:'Done',all:'All',refresh:'🔄 Refresh',waitEmpty:'No pending cases.',doneEmpty:'No completed cases.',doneHeader:'📁 Completed Cases — Click status to restore'}
};
function toggleLang(){lang=lang==='KR'?'EN':'KR';localStorage.setItem('apg-lang',lang);applyLang();render()}
function applyLang(){
  const t=T[lang];
  document.getElementById('langBtn').textContent=lang==='KR'?'EN':'KR';
  document.querySelectorAll('[data-t]').forEach(el=>{const k=el.getAttribute('data-t');if(t[k])el.textContent=t[k]});
  const rb=document.querySelector('[onclick="location.reload()"]');if(rb)rb.textContent=t.refresh;
}
const DEFAULT_CASES = [
  {mail:"#7346",start:"2026-03-06",airline:"AT",person:"-",content:"갑작스런 커미션 변경으로 인한 컴플레인. 이영롱 과장(와이페이모어) KRW 171,016 보상 요구. 베니에게 메일 발송했으나 권부장님 출장 중이라 베니와 논의 예정.",status:"대기",done:"-"},
  {mail:"#7403",start:"2026-03-17",airline:"GP (ID)",person:"-",content:"공항에서 티켓이 안 보여 탑승 거부된 사례. 김경영(하나투어부산). 본사 확인 중이며 확인 후 연락 예정.",status:"대기",done:"-"},
  {mail:"#7599",start:"2026-04-23",airline:"SZ",person:"-",content:"SZ 당일 헤비딜레이로 인한 환불문의 중",status:"대기",done:"-"}
];
const DEFAULT_ARCHIVE = [
  {mail:"#7509",start:"2026-04-06",airline:"TC",person:"-",content:"TK로 인한 MCT SHORT 케이스. 홍영애(투어컬쳐) 요청. TC에 메일 발송했으나 답변 미수신. 여행사 2차 재촉 상태. ★ TC본사 여러 차례 연락 시도했으나 연결 안 됨. 여행사 측 급하므로 INVOL 재발권 안내 완료. 단, ADM에 대해서는 APG 개런티 불가 안내. 추후 TC 본사 연락 오면 즉시 회신 예정. (14APR)",status:"완료",done:"17APR"},
  {mail:"#7510",start:"2026-04-08",airline:"TC",person:"-",content:"TK로 인한 MCT SHORT 케이스. 박진선(여기어때) 요청. TC에 메일 발송했으나 답변 미수신. ★ TC본사 여러 차례 연락 시도했으나 연결 안 됨. 여행사 측 급하므로 INVOL 재발권 안내 완료. 단, ADM에 대해서는 APG 개런티 불가 안내. 추후 TC 본사 연락 오면 즉시 회신 예정. (14APR)",status:"완료",done:"17APR"}
];

let cases, archive;
let filter='all'; // 'all','대기','완료'
function load(){
  try{cases=JSON.parse(localStorage.getItem('apg-cases'))||[...DEFAULT_CASES]}catch(e){cases=[...DEFAULT_CASES]}
  try{archive=JSON.parse(localStorage.getItem('apg-archive'))||null}catch(e){archive=null}
  if(archive===null){archive=[...DEFAULT_ARCHIVE];localStorage.setItem('apg-archive',JSON.stringify(archive))}
  if(!localStorage.getItem('apg-cases'))localStorage.setItem('apg-cases',JSON.stringify(cases));
}
load();
function save(){localStorage.setItem('apg-cases',JSON.stringify(cases));localStorage.setItem('apg-archive',JSON.stringify(archive))}

function autoDate(el){
  let v=el.value.trim();if(!v)return;
  v=v.replace(/\./g,'-').replace(/\//g,'-');
  const m=v.match(/^(\d{1,2})-(\d{1,2})$/);
  if(m)v='2026-'+m[1].padStart(2,'0')+'-'+m[2].padStart(2,'0');
  el.value=v;
}

function addCase(){
  const m=document.getElementById('f-mail').value.trim();
  const s=document.getElementById('f-start').value;
  const a=document.getElementById('f-airline').value.trim();
  const p=document.getElementById('f-person').value.trim();
  const c=document.getElementById('f-content').value.trim();
  if(!c){alert('내용을 입력해주세요');return}
  cases.unshift({mail:m||'-',start:s||'-',airline:a||'-',person:p||'-',content:c,status:'대기',done:'-'});
  save();render();
  document.getElementById('f-mail').value='';
  document.getElementById('f-start').value='';
  document.getElementById('f-airline').value='';
  document.getElementById('f-person').value='';
  document.getElementById('f-content').value='';
}

function toggleStatus(source,i){
  if(source==='active'){
    const d=prompt('완료날짜 입력 (예: 30APR):','');
    if(!d)return;
    cases[i].status='완료';cases[i].done=d;
    archive.unshift(cases.splice(i,1)[0]);
  } else {
    archive[i].status='대기';archive[i].done='-';
    cases.unshift(archive.splice(i,1)[0]);
  }
  save();render();
}

function deleteActive(i){if(confirm('삭제하시겠습니까?')){cases.splice(i,1);save();render()}}
function deleteArchive(i){if(confirm('삭제하시겠습니까?')){archive.splice(i,1);save();render()}}

function editCell(el,source,idx,field){
  if(el.querySelector('input,textarea'))return;
  const list=source==='active'?cases:archive;
  const c=list[idx];
  const val=(c[field]==='-')?'':c[field];
  const isLong=field==='content';
  const inp=document.createElement(isLong?'textarea':'input');
  inp.className=isLong?'edit-textarea':'edit-input';
  inp.value=val;
  el.textContent='';el.appendChild(inp);inp.focus();
  function finish(){
    let v=inp.value.trim();
    if(field==='start'&&v){autoDate(inp);v=inp.value.trim()}
    c[field]=v||'-';save();render();
  }
  inp.addEventListener('blur',finish);
  if(!isLong)inp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();finish()}});
}

function toggleArchive(){
  const sec=document.getElementById('archiveSection');
  const hdr=document.getElementById('archiveHeader');
  sec.classList.toggle('collapsed');
  hdr.classList.toggle('collapsed');
}

function setFilter(f){filter=filter===f?'all':f;render()}

function makeCell(cls,source,i,field,val){
  return `<td class="${cls}" data-field onclick="editCell(this,'${source}',${i},'${field}')">${val||'-'}</td>`;
}

function render(){
  const waitCount=cases.length;
  const doneCount=archive.length;

  // 상단 필터
  const t=T[lang];
  document.getElementById('topBar').innerHTML=`
    <div class="filter-btn f-all ${filter==='all'?'active':''}" onclick="setFilter('all')">
      <div><div class="f-num">${waitCount+doneCount}</div><div class="f-label">${t.all}</div></div>
    </div>
    <div class="filter-btn f-wait ${filter==='대기'||filter==='all'?'active':''}" onclick="setFilter('대기')">
      <div><div class="f-num">${waitCount}</div><div class="f-label">${t.wait}</div></div>
    </div>
    <div class="filter-btn f-done ${filter==='완료'||filter==='all'?'active':''}" onclick="setFilter('완료')">
      <div><div class="f-num">${doneCount}</div><div class="f-label">${t.done}</div></div>
    </div>`;

  const showWait=filter==='all'||filter==='대기';
  const showDone=filter==='all'||filter==='완료';

  // 대기 테이블
  const waitTable=document.getElementById('waitTable');
  const waitBody=document.getElementById('waitBody');
  const waitEmpty=document.getElementById('waitEmpty');
  waitBody.innerHTML='';
  if(!showWait||cases.length===0){waitTable.style.display='none';if(showWait)waitEmpty.style.display='block';else waitEmpty.style.display='none'}
  else{waitTable.style.display='';waitEmpty.style.display='none';
    cases.forEach((c,i)=>{const tr=document.createElement('tr');
      tr.innerHTML=`<td class="td-seq">${i+1}</td>
        ${makeCell('td-mail','active',i,'mail',c.mail)}
        ${makeCell('td-date','active',i,'start',c.start)}
        ${makeCell('td-airline','active',i,'airline',c.airline)}
        <td data-field onclick="editCell(this,'active',${i},'person')" style="white-space:nowrap;font-size:12px;color:#6366f1;font-size:12px">${c.person||'-'}</td>
        ${makeCell('td-content','active',i,'content',c.content)}
        <td><span class="badge b-wait" onclick="toggleStatus('active',${i})" title="클릭: 완료로 변경">${t.wait}</span></td>
        <td style="white-space:nowrap"><button class="btn-del" onclick="deleteActive(${i})">🗑️</button></td>`;
      waitBody.appendChild(tr)});
  }

  // 완료 테이블
  const aBody=document.getElementById('doneBody');
  const aEmpty=document.getElementById('doneEmpty');
  const aCount=document.getElementById('archiveCount');
  const aSec=document.getElementById('archiveSection');
  aCount.textContent=archive.length;
  aBody.innerHTML='';
  if(!showDone){aSec.style.display='none'}
  else{aSec.style.display='';
    if(archive.length===0){aEmpty.style.display='block';aBody.parentElement.style.display='none'}
    else{aEmpty.style.display='none';aBody.parentElement.style.display='';
      archive.forEach((c,i)=>{const tr=document.createElement('tr');
        tr.innerHTML=`<td class="td-seq">${i+1}</td>
          ${makeCell('td-mail','archive',i,'mail',c.mail)}
          ${makeCell('td-date','archive',i,'start',c.start)}
          ${makeCell('td-airline','archive',i,'airline',c.airline)}
          <td data-field onclick="editCell(this,'archive',${i},'person')" style="white-space:nowrap;font-size:12px;color:#6366f1;font-size:12px">${c.person||'-'}</td>
          ${makeCell('td-content','archive',i,'content',c.content)}
          ${makeCell('td-date','archive',i,'done',c.done)}
          <td><span class="badge b-done" onclick="toggleStatus('archive',${i})" title="클릭: 대기로 복원">${t.done}</span></td>
          <td style="white-space:nowrap"><button class="btn-del" onclick="deleteArchive(${i})">🗑️</button></td>`;
        aBody.appendChild(tr)});
    }
  }
  document.getElementById('updated').textContent=(lang==='KR'?'마지막 업데이트: ':'Last updated: ')+new Date().toLocaleString('ko-KR',{timeZone:'Asia/Seoul'});
  applyLang();
}
render();
</script>
</body>
</html>
